services:
  backend:
    build:
      context: .
      dockerfile: src/Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - ./src:/app/src
      - ./config:/app/config
    environment:
      - RACKSCOPE_APP_CONFIG=/app/config/app.yaml
    command: uvicorn rackscope.api.app:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - CHOKIDAR_USEPOLLING=true

  simulator:
    build:
      context: ./tools/simulator
    ports:
      - "9000:9000"
    volumes:
      - ./config/topology/topology.yaml:/app/config/topology.yaml:ro
      - ./config/simulator.yaml:/app/config/simulator.yaml:ro
    environment:
      - TOPOLOGY_FILE=/app/config/topology.yaml
      - SIMULATOR_CONFIG=/app/config/simulator.yaml

  prometheus:
    image: prom/prometheus:latest
    ports:
      - "9090:9090"
    volumes:
      - ./tools/simulator/prometheus.yml:/etc/prometheus/prometheus.yml:ro
