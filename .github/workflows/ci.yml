name: CI

# Runs on every push / PR to main, and weekly on Monday.
# Two parallel jobs (backend + frontend) then STATUS.md update.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 6 * * 1'  # weekly Monday 06:00 UTC

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ── Backend: ruff · mypy · pytest ─────────────────────────────────────────
  backend:
    name: Backend
    runs-on: ubuntu-latest
    env:
      PYTHONPATH: src:.
      RACKSCOPE_CONFIG_DIR: config
      RACKSCOPE_APP_CONFIG: config/app.yaml
    outputs:
      tests_passed: ${{ steps.tests.outputs.passed }}
      tests_failed: ${{ steps.tests.outputs.failed }}
      coverage:     ${{ steps.tests.outputs.coverage }}
      lint:         ${{ steps.lint.outcome }}
      mypy:         ${{ steps.mypy.outcome }}

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install dependencies
        run: pip install -e ".[dev]" pip-audit

      - name: Lint (ruff check + format)
        id: lint
        run: ruff check . && ruff format --check .

      - name: Type check (mypy)
        id: mypy
        run: mypy src/rackscope --no-error-summary

      - name: Tests (pytest + coverage)
        id: tests
        run: |
          pytest --tb=short -q \
            --cov=src/rackscope \
            --cov-report=term-missing \
            --cov-report=json:coverage.json \
            2>&1 | tee test_output.txt || true

          PASSED=$(grep -oP '\d+ passed' test_output.txt | grep -oP '\d+' | head -1)
          PASSED="${PASSED:-0}"
          FAILED=$(grep -oP '\d+ failed' test_output.txt | grep -oP '\d+' | head -1)
          FAILED="${FAILED:-0}"
          COVERAGE=$(python3 -c "
          import json
          d = json.load(open('coverage.json'))
          print(round(d['totals']['percent_covered']))
          " 2>/dev/null || echo 0)

          echo "passed=$PASSED"     >> "$GITHUB_OUTPUT"
          echo "failed=$FAILED"     >> "$GITHUB_OUTPUT"
          echo "coverage=$COVERAGE" >> "$GITHUB_OUTPUT"

          [ "$FAILED" = "0" ] || exit 1

  # ── Frontend: eslint · prettier · stylelint · tsc ─────────────────────────
  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    outputs:
      lint:  ${{ steps.lint.outcome }}
      build: ${{ steps.build.outcome }}

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f  # v6
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci --legacy-peer-deps

      - name: Copy plugins (needed for @plugins alias resolution)
        run: cp -r plugins frontend/plugins

      - name: Lint (eslint + prettier + stylelint)
        id: lint
        working-directory: frontend
        run: npm run lint && npm run lint:css && npm run lint:format

      - name: TypeScript build
        id: build
        working-directory: frontend
        run: npm run build
