name: CI

# Runs on every push / PR to main, and weekly on Monday.
# Two parallel jobs (backend + frontend) then STATUS.md update.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 6 * * 1'  # weekly Monday 06:00 UTC

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ── Backend: ruff · mypy · pytest ─────────────────────────────────────────
  backend:
    name: Backend
    runs-on: ubuntu-latest
    env:
      PYTHONPATH: src:.
      RACKSCOPE_CONFIG_DIR: config
      RACKSCOPE_APP_CONFIG: config/app.yaml
    outputs:
      tests_passed: ${{ steps.tests.outputs.passed }}
      tests_failed: ${{ steps.tests.outputs.failed }}
      coverage:     ${{ steps.tests.outputs.coverage }}
      lint:         ${{ steps.lint.outcome }}
      mypy:         ${{ steps.mypy.outcome }}

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - uses: actions/setup-python@42375524e23c412d93fb67b49958b491fce71c38  # v5.4.0
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install dependencies
        run: pip install -e ".[dev]" pip-audit

      - name: Lint (ruff check + format)
        id: lint
        run: ruff check . && ruff format --check .

      - name: Type check (mypy)
        id: mypy
        run: mypy src/rackscope --no-error-summary

      - name: Tests (pytest + coverage)
        id: tests
        run: |
          pytest --tb=short -q \
            --cov=src/rackscope \
            --cov-report=term-missing \
            --cov-report=json:coverage.json \
            2>&1 | tee test_output.txt || true

          PASSED=$(grep -oP '\d+ passed' test_output.txt | grep -oP '\d+' | head -1)
          PASSED="${PASSED:-0}"
          FAILED=$(grep -oP '\d+ failed' test_output.txt | grep -oP '\d+' | head -1)
          FAILED="${FAILED:-0}"
          COVERAGE=$(python3 -c "
          import json
          d = json.load(open('coverage.json'))
          print(round(d['totals']['percent_covered']))
          " 2>/dev/null || echo 0)

          echo "passed=$PASSED"     >> "$GITHUB_OUTPUT"
          echo "failed=$FAILED"     >> "$GITHUB_OUTPUT"
          echo "coverage=$COVERAGE" >> "$GITHUB_OUTPUT"

          [ "$FAILED" = "0" ] || exit 1

  # ── Frontend: eslint · prettier · stylelint · tsc ─────────────────────────
  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    outputs:
      lint:  ${{ steps.lint.outcome }}
      build: ${{ steps.build.outcome }}

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - uses: actions/setup-node@cdca7365b2dadb8aad0a33bc7601856ffabcc48e  # v4.3.0
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci --legacy-peer-deps

      - name: Copy plugins (needed for @plugins alias resolution)
        run: cp -r plugins frontend/plugins

      - name: Lint (eslint + prettier + stylelint)
        id: lint
        working-directory: frontend
        run: npm run lint && npm run lint:css && npm run lint:format

      - name: TypeScript build
        id: build
        working-directory: frontend
        run: npm run build

  # ── Update STATUS.md (push to main only, always runs) ─────────────────────
  update-status:
    name: Update STATUS.md
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    if: always() && github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate STATUS.md
        env:
          TESTS_PASSED: ${{ needs.backend.outputs.tests_passed }}
          TESTS_FAILED: ${{ needs.backend.outputs.tests_failed }}
          COVERAGE:     ${{ needs.backend.outputs.coverage }}
          BE_LINT:      ${{ needs.backend.outputs.lint }}
          BE_MYPY:      ${{ needs.backend.outputs.mypy }}
          FE_LINT:      ${{ needs.frontend.outputs.lint }}
          FE_BUILD:     ${{ needs.frontend.outputs.build }}
          COMMIT_SHA:   ${{ github.sha }}
          RUN_ID:       ${{ github.run_id }}
          REPO:         ${{ github.repository }}
          SERVER_URL:   ${{ github.server_url }}
        run: python3 scripts/gen_status.py

      - name: Commit STATUS.md
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add STATUS.md
          git diff --staged --quiet \
            && echo "STATUS.md unchanged" \
            || (git commit -m "ci: update STATUS.md [skip ci]" && git push)
