name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 6 * * 1'

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ── Lint + Tests (Docker Compose, mirrors local dev workflow) ──────────────
  quality:
    name: Quality
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@b5ca514318bd6ebac0fb2aedd5d36ec1b5c232a2  # v3.10.0

      - name: Build stack
        run: docker compose -f docker-compose.dev.yml build
        env:
          DOCKER_BUILDKIT: 1

      - name: Start stack
        run: docker compose -f docker-compose.dev.yml up -d

      - name: Wait for backend to be ready
        run: |
          for i in $(seq 1 30); do
            if docker compose -f docker-compose.dev.yml exec -T backend python -c "import rackscope" 2>/dev/null; then
              echo "Backend ready"
              break
            fi
            echo "Waiting... ($i/30)"
            sleep 2
          done

      - name: Lint (ruff + eslint + prettier + stylelint)
        id: lint
        run: make lint
        continue-on-error: true

      - name: Tests (pytest 855+)
        id: tests
        run: |
          docker compose -f docker-compose.dev.yml exec -T backend \
            pytest --tb=short -q \
            --cov=src/rackscope \
            --cov-report=term-missing \
            --cov-report=json:coverage.json \
            2>&1 | tee test_output.txt || true

          PASSED=$(grep -oP '\d+ passed' test_output.txt | grep -oP '\d+' | head -1 || echo 0)
          FAILED=$(grep -oP '\d+ failed' test_output.txt | grep -oP '\d+' | head -1 || echo 0)
          COVERAGE=$(docker compose -f docker-compose.dev.yml exec -T backend python3 -c "
          import json
          d = json.load(open('coverage.json'))
          print(round(d['totals']['percent_covered']))
          " 2>/dev/null || echo 0)

          echo "passed=$PASSED"     >> "$GITHUB_OUTPUT"
          echo "failed=$FAILED"     >> "$GITHUB_OUTPUT"
          echo "coverage=$COVERAGE" >> "$GITHUB_OUTPUT"

          [ "$FAILED" = "0" ] || exit 1

      - name: TypeScript build
        id: tsbuild
        run: docker compose -f docker-compose.dev.yml exec -T frontend npm run build
        continue-on-error: true

      - name: Type check (mypy)
        id: mypy
        run: |
          docker compose -f docker-compose.dev.yml exec -T backend \
            /home/appuser/.local/bin/mypy src/rackscope
        continue-on-error: true

      - name: Stop stack
        if: always()
        run: docker compose -f docker-compose.dev.yml down

      - name: Update STATUS.md
        if: always() && github.ref == 'refs/heads/main'
        env:
          TESTS_PASSED:   ${{ steps.tests.outputs.passed }}
          TESTS_FAILED:   ${{ steps.tests.outputs.failed }}
          COVERAGE:       ${{ steps.tests.outputs.coverage }}
          BE_LINT:        ${{ steps.lint.outcome }}
          BE_MYPY:        ${{ steps.mypy.outcome }}
          FE_BUILD:       ${{ steps.tsbuild.outcome }}
          COMMIT_SHA:     ${{ github.sha }}
          RUN_ID:         ${{ github.run_id }}
          REPO:           ${{ github.repository }}
          SERVER_URL:     ${{ github.server_url }}
        run: python3 scripts/gen_status.py

      - name: Commit STATUS.md
        if: always() && github.ref == 'refs/heads/main'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add STATUS.md
          git diff --staged --quiet \
            && echo "STATUS.md unchanged" \
            || (git commit -m "ci: update STATUS.md [skip ci]" && git push)
