name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 6 * * 1'

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Backend: tests + lint + typecheck + security ──────────────────────────
  backend:
    name: Backend
    runs-on: ubuntu-latest
    env:
      PYTHONPATH: src:.
      RACKSCOPE_CONFIG_DIR: config
      RACKSCOPE_APP_CONFIG: config/app.yaml
    outputs:
      tests_passed: ${{ steps.tests.outputs.passed }}
      tests_failed: ${{ steps.tests.outputs.failed }}
      coverage:     ${{ steps.tests.outputs.coverage }}
      lint_status:  ${{ steps.lint.outputs.status }}
      mypy_status:  ${{ steps.mypy.outputs.status }}
      audit_status: ${{ steps.audit.outputs.status }}
      audit_vulns:  ${{ steps.audit.outputs.vulns }}

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - uses: actions/setup-python@42375524e23c412d93fb67b49958b491fce71c38  # v5.4.0
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install dependencies
        run: pip install -e ".[dev]" pip-audit

      - name: Run tests
        id: tests
        run: |
          pytest --tb=short -q \
            --cov=src/rackscope \
            --cov-report=term-missing \
            --cov-report=json:coverage.json \
            2>&1 | tee test_output.txt || true

          PASSED=$(grep -oP '\d+ passed' test_output.txt | grep -oP '\d+' | head -1 || echo 0)
          FAILED=
          FAILED="${FAILED:-0}"$(grep -oP '\d+ failed' test_output.txt | grep -oP '\d+' | head -1 || echo 0)
          COVERAGE=$(python3 -c "
          import json
          d = json.load(open('coverage.json'))
          print(round(d['totals']['percent_covered']))
          " 2>/dev/null || echo 0)

          echo "passed=$PASSED"     >> "$GITHUB_OUTPUT"
          echo "failed=$FAILED"     >> "$GITHUB_OUTPUT"
          echo "coverage=$COVERAGE" >> "$GITHUB_OUTPUT"

          [ "$FAILED" = "0" ] || exit 1

      - name: Python lint (ruff)
        id: lint
        run: |
          ruff check . && ruff format --check . \
            && echo "status=passing" >> "$GITHUB_OUTPUT" \
            || (echo "status=failing" >> "$GITHUB_OUTPUT" && exit 1)

      - name: Type check (mypy)
        id: mypy
        run: |
          mypy src/rackscope --no-error-summary \
            && echo "status=passing" >> "$GITHUB_OUTPUT" \
            || (echo "status=failing" >> "$GITHUB_OUTPUT" && exit 1)

      - name: Security audit (pip-audit)
        id: audit
        continue-on-error: true
        run: |
          pip-audit --format=json --output=pip_audit.json
          VULNS=$(python3 -c "
          import json, os
          if os.path.exists('pip_audit.json'):
              d = json.load(open('pip_audit.json'))
              print(sum(len(v.get('vulns', [])) for v in d.get('dependencies', [])))
          else:
              print(0)
          ")
          echo "vulns=$VULNS" >> "$GITHUB_OUTPUT"
          if [ "$VULNS" = "0" ]; then
            echo "status=passing" >> "$GITHUB_OUTPUT"
          else
            echo "status=warning" >> "$GITHUB_OUTPUT"
          fi

  # ── Frontend: lint + typecheck + build + audit ────────────────────────────
  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    outputs:
      lint_status:  ${{ steps.lint.outputs.status }}
      build_status: ${{ steps.build.outputs.status }}
      audit_status: ${{ steps.audit.outputs.status }}
      audit_vulns:  ${{ steps.audit.outputs.vulns }}

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - uses: actions/setup-node@cdca7365b2dadb8aad0a33bc7601856ffabcc48e  # v4.3.0
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci --legacy-peer-deps

      - name: Frontend lint
        id: lint
        working-directory: frontend
        run: |
          npm run lint && npm run lint:css && npm run lint:format \
            && echo "status=passing" >> "$GITHUB_OUTPUT" \
            || (echo "status=failing" >> "$GITHUB_OUTPUT" && exit 1)

      - name: TypeScript build
        id: build
        working-directory: frontend
        run: |
          npm run build \
            && echo "status=passing" >> "$GITHUB_OUTPUT" \
            || (echo "status=failing" >> "$GITHUB_OUTPUT" && exit 1)

      - name: Security audit (npm)
        id: audit
        working-directory: frontend
        continue-on-error: true
        run: |
          AUDIT_OUT=$(npm audit --json 2>/dev/null || echo '{}')
          HIGH=$(echo "$AUDIT_OUT" | python3 -c "
          import json, sys
          d = json.load(sys.stdin)
          m = d.get('metadata', {}).get('vulnerabilities', {})
          print(m.get('high', 0) + m.get('critical', 0))
          " 2>/dev/null || echo 0)
          echo "vulns=$HIGH" >> "$GITHUB_OUTPUT"
          if [ "$HIGH" = "0" ]; then
            echo "status=passing" >> "$GITHUB_OUTPUT"
          else
            echo "status=warning" >> "$GITHUB_OUTPUT"
          fi

  # ── Update STATUS.md (main branch only, always runs) ─────────────────────
  update-status:
    name: Update STATUS.md
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    if: always() && github.ref == 'refs/heads/main'
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate STATUS.md
        env:
          TESTS_PASSED:   ${{ needs.backend.outputs.tests_passed }}
          TESTS_FAILED:   ${{ needs.backend.outputs.tests_failed }}
          COVERAGE:       ${{ needs.backend.outputs.coverage }}
          BE_LINT:        ${{ needs.backend.outputs.lint_status }}
          BE_MYPY:        ${{ needs.backend.outputs.mypy_status }}
          BE_AUDIT:       ${{ needs.backend.outputs.audit_status }}
          BE_AUDIT_VULNS: ${{ needs.backend.outputs.audit_vulns }}
          FE_LINT:        ${{ needs.frontend.outputs.lint_status }}
          FE_BUILD:       ${{ needs.frontend.outputs.build_status }}
          FE_AUDIT:       ${{ needs.frontend.outputs.audit_status }}
          FE_AUDIT_VULNS: ${{ needs.frontend.outputs.audit_vulns }}
          COMMIT_SHA:     ${{ github.sha }}
          RUN_ID:         ${{ github.run_id }}
          REPO:           ${{ github.repository }}
          SERVER_URL:     ${{ github.server_url }}
        run: python3 scripts/gen_status.py

      - name: Commit STATUS.md
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add STATUS.md
          git diff --staged --quiet \
            && echo "STATUS.md unchanged" \
            || (git commit -m "ci: update STATUS.md [skip ci]" && git push)
