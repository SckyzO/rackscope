name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 6 * * 1'

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Backend: tests + lint + typecheck + security ──────────────────────────
  backend:
    name: Backend
    runs-on: ubuntu-latest
    outputs:
      tests_passed: ${{ steps.tests.outputs.passed }}
      tests_failed: ${{ steps.tests.outputs.failed }}
      coverage:     ${{ steps.tests.outputs.coverage }}
      lint_status:  ${{ steps.lint.outputs.status }}
      mypy_status:  ${{ steps.mypy.outputs.status }}
      audit_status: ${{ steps.audit.outputs.status }}
      audit_vulns:  ${{ steps.audit.outputs.vulns }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install dependencies
        run: pip install -e ".[dev]" pip-audit

      - name: Run tests
        id: tests
        run: |
          pytest --tb=short -q \
            --cov=src/rackscope \
            --cov-report=term-missing \
            --cov-report=json:coverage.json \
            2>&1 | tee test_output.txt || true

          PASSED=$(grep -oP '\d+ passed' test_output.txt | grep -oP '\d+' | head -1 || echo 0)
          FAILED=$(grep -oP '\d+ failed' test_output.txt | grep -oP '\d+' | head -1 || echo 0)
          COVERAGE=$(python3 -c "
          import json
          d = json.load(open('coverage.json'))
          print(round(d['totals']['percent_covered']))
          " 2>/dev/null || echo 0)

          echo "passed=$PASSED"     >> "$GITHUB_OUTPUT"
          echo "failed=$FAILED"     >> "$GITHUB_OUTPUT"
          echo "coverage=$COVERAGE" >> "$GITHUB_OUTPUT"

          [ "$FAILED" = "0" ] || exit 1

      - name: Python lint (ruff)
        id: lint
        run: |
          ruff check . && ruff format --check . \
            && echo "status=passing" >> "$GITHUB_OUTPUT" \
            || (echo "status=failing" >> "$GITHUB_OUTPUT" && exit 1)

      - name: Type check (mypy)
        id: mypy
        run: |
          mypy src/rackscope --no-error-summary \
            && echo "status=passing" >> "$GITHUB_OUTPUT" \
            || (echo "status=failing" >> "$GITHUB_OUTPUT" && exit 1)

      - name: Security audit (pip-audit)
        id: audit
        run: |
          pip-audit --format=json --output=pip_audit.json 2>/dev/null || true
          VULNS=$(python3 -c "
          import json, os
          if os.path.exists('pip_audit.json'):
              d = json.load(open('pip_audit.json'))
              print(sum(len(v.get('vulns', [])) for v in d.get('dependencies', [])))
          else:
              print(0)
          ")
          echo "vulns=$VULNS" >> "$GITHUB_OUTPUT"
          if [ "$VULNS" = "0" ]; then
            echo "status=passing" >> "$GITHUB_OUTPUT"
          else
            echo "status=warning" >> "$GITHUB_OUTPUT"
          fi

  # ── Frontend: lint + typecheck + build + audit ────────────────────────────
  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    outputs:
      lint_status:  ${{ steps.lint.outputs.status }}
      build_status: ${{ steps.build.outputs.status }}
      audit_status: ${{ steps.audit.outputs.status }}
      audit_vulns:  ${{ steps.audit.outputs.vulns }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci --legacy-peer-deps

      - name: Frontend lint
        id: lint
        working-directory: frontend
        run: |
          npm run lint && npm run lint:css && npm run lint:format \
            && echo "status=passing" >> "$GITHUB_OUTPUT" \
            || (echo "status=failing" >> "$GITHUB_OUTPUT" && exit 1)

      - name: TypeScript build
        id: build
        working-directory: frontend
        run: |
          npm run build \
            && echo "status=passing" >> "$GITHUB_OUTPUT" \
            || (echo "status=failing" >> "$GITHUB_OUTPUT" && exit 1)

      - name: Security audit (npm)
        id: audit
        working-directory: frontend
        run: |
          AUDIT_OUT=$(npm audit --json 2>/dev/null || echo '{}')
          HIGH=$(echo "$AUDIT_OUT" | python3 -c "
          import json, sys
          d = json.load(sys.stdin)
          m = d.get('metadata', {}).get('vulnerabilities', {})
          print(m.get('high', 0) + m.get('critical', 0))
          " 2>/dev/null || echo 0)
          echo "vulns=$HIGH" >> "$GITHUB_OUTPUT"
          if [ "$HIGH" = "0" ]; then
            echo "status=passing" >> "$GITHUB_OUTPUT"
          else
            echo "status=warning" >> "$GITHUB_OUTPUT"
          fi

  # ── Update STATUS.md (main branch only, always runs) ─────────────────────
  update-status:
    name: Update STATUS.md
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    if: always() && github.ref == 'refs/heads/main'
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate STATUS.md
        env:
          TESTS_PASSED:   ${{ needs.backend.outputs.tests_passed }}
          TESTS_FAILED:   ${{ needs.backend.outputs.tests_failed }}
          COVERAGE:       ${{ needs.backend.outputs.coverage }}
          BE_LINT:        ${{ needs.backend.outputs.lint_status }}
          BE_MYPY:        ${{ needs.backend.outputs.mypy_status }}
          BE_AUDIT:       ${{ needs.backend.outputs.audit_status }}
          BE_AUDIT_VULNS: ${{ needs.backend.outputs.audit_vulns }}
          FE_LINT:        ${{ needs.frontend.outputs.lint_status }}
          FE_BUILD:       ${{ needs.frontend.outputs.build_status }}
          FE_AUDIT:       ${{ needs.frontend.outputs.audit_status }}
          FE_AUDIT_VULNS: ${{ needs.frontend.outputs.audit_vulns }}
          COMMIT_SHA:     ${{ github.sha }}
          RUN_ID:         ${{ github.run_id }}
          REPO:           ${{ github.repository }}
          SERVER_URL:     ${{ github.server_url }}
        run: |
          python3 - <<'PYEOF'
          import os, datetime

          def icon(status):
              return {'passing': '✅', 'warning': '⚠️', 'failing': '❌'}.get(status or '', '⬜')

          now  = datetime.datetime.utcnow().strftime('%Y-%m-%d %H:%M UTC')
          sha  = (os.environ.get('COMMIT_SHA') or '')[:7]
          repo = os.environ.get('REPO', '')
          srv  = os.environ.get('SERVER_URL', 'https://github.com')
          rid  = os.environ.get('RUN_ID', '')
          url  = f"{srv}/{repo}/actions/runs/{rid}"

          t_ok = os.environ.get('TESTS_PASSED') or '?'
          t_ko = os.environ.get('TESTS_FAILED') or '0'
          cov  = os.environ.get('COVERAGE') or '?'

          be_lint  = os.environ.get('BE_LINT') or 'unknown'
          be_mypy  = os.environ.get('BE_MYPY') or 'unknown'
          be_audit = os.environ.get('BE_AUDIT') or 'unknown'
          be_av    = os.environ.get('BE_AUDIT_VULNS') or '0'

          fe_lint  = os.environ.get('FE_LINT') or 'unknown'
          fe_build = os.environ.get('FE_BUILD') or 'unknown'
          fe_audit = os.environ.get('FE_AUDIT') or 'unknown'
          fe_av    = os.environ.get('FE_AUDIT_VULNS') or '0'

          tests_ok = t_ko == '0'

          be_audit_detail = f"pip-audit · {be_av} vulns" if be_audit == 'warning' else "pip-audit · clean"
          fe_audit_detail = f"npm audit · {fe_av} high/critical" if fe_audit == 'warning' else "npm audit · clean"

          md = f"""# Rackscope — Status

> Updated: {now} · Commit: [{sha}]({srv}/{repo}/commit/{os.environ.get('COMMIT_SHA','')}) · [View run]({url})

## Summary

| Check | Status | Detail |
|---|---|---|
| 🧪 **Tests** | {'✅' if tests_ok else '❌'} {t_ok} passed | {t_ko} failed · {cov}% coverage |
| 🔍 **Python lint** | {icon(be_lint)} {be_lint} | ruff check + ruff format |
| 📐 **Python types** | {icon(be_mypy)} {be_mypy} | mypy |
| 🎨 **Frontend lint** | {icon(fe_lint)} {fe_lint} | eslint · prettier · stylelint |
| 📦 **TypeScript** | {icon(fe_build)} {fe_build} | tsc -b |
| 🔒 **Python security** | {icon(be_audit)} {be_audit} | {be_audit_detail} |
| 🔒 **npm security** | {icon(fe_audit)} {fe_audit} | {fe_audit_detail} |
"""
          open('STATUS.md', 'w').write(md)
          print("STATUS.md written")
          PYEOF

      - name: Commit STATUS.md
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add STATUS.md
          git diff --staged --quiet \
            && echo "STATUS.md unchanged, nothing to commit" \
            || (git commit -m "ci: update STATUS.md [skip ci]" && git push)
