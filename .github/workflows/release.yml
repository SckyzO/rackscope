name: Release

# Triggers:
#   1. push v* tag  → standard release flow
#   2. workflow_dispatch → manual re-release of an existing tag

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release (e.g. v1.0.0-beta1)"
        required: true

env:
  REGISTRY: ghcr.io
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ── Build and push versioned Docker images ─────────────────────────────────
  build-images:
    name: Build & push images
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      version: ${{ steps.version.outputs.version }}
      tag:     ${{ steps.version.outputs.tag }}

    steps:
      - name: Resolve tag and version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ github.event.inputs.tag }}"
          else
            TAG="${{ github.ref_name }}"
          fi
          VERSION="${TAG#v}"
          echo "tag=$TAG"         >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Building: $TAG ($VERSION)"

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
        with:
          ref: ${{ steps.version.outputs.tag }}

      - name: Log in to GHCR
        uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2  # v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd  # v4

      - name: Sanitize owner (lowercase for GHCR)
        id: owner
        run: echo "name=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      # ── Backend ─────────────────────────────────────────────────────────────
      - name: Backend metadata
        id: backend-meta
        uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf  # v6
        with:
          images: ${{ env.REGISTRY }}/${{ steps.owner.outputs.name }}/rackscope-backend
          tags: |
            type=raw,value=${{ steps.version.outputs.version }}
            type=raw,value=latest

      - name: Build & push backend
        uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294  # v7
        with:
          context: .
          file: src/Dockerfile
          push: true
          tags: ${{ steps.backend-meta.outputs.tags }}
          labels: ${{ steps.backend-meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ── Frontend ─────────────────────────────────────────────────────────────
      - name: Frontend metadata
        id: frontend-meta
        uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf  # v6
        with:
          images: ${{ env.REGISTRY }}/${{ steps.owner.outputs.name }}/rackscope-frontend
          tags: |
            type=raw,value=${{ steps.version.outputs.version }}
            type=raw,value=latest

      - name: Build & push frontend
        uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294  # v7
        with:
          context: .
          file: frontend/Dockerfile.prod
          push: true
          tags: ${{ steps.frontend-meta.outputs.tags }}
          labels: ${{ steps.frontend-meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Create GitHub Release ───────────────────────────────────────────────────
  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: build-images
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
        with:
          ref: ${{ needs.build-images.outputs.tag }}
          fetch-depth: 0

      - name: Extract changelog section
        run: |
          python3 - << 'PYEOF'
          import re, os
          version = os.environ["VERSION"]
          content = open("CHANGELOG.md").read()
          pattern = rf"## \[{re.escape(version)}\].*?(?=\n## \[|\Z)"
          match = re.search(pattern, content, re.DOTALL)
          section = match.group(0).strip() if match else f"Release {version}"
          open("release_notes.md", "w").write(section)
          print(f"Extracted changelog for {version}")
          PYEOF
        env:
          VERSION: ${{ needs.build-images.outputs.version }}

      - name: Append Docker install instructions
        run: |
          VERSION="${{ needs.build-images.outputs.version }}"
          OWNER="${{ github.repository_owner }}"
          OWNER_LC=$(echo "$OWNER" | tr '[:upper:]' '[:lower:]')
          cat >> release_notes.md << NOTES

          ---

          ## Docker images

          \`\`\`bash
          docker pull ${{ env.REGISTRY }}/${OWNER_LC}/rackscope-backend:${VERSION}
          docker pull ${{ env.REGISTRY }}/${OWNER_LC}/rackscope-frontend:${VERSION}
          \`\`\`

          ## Quick start (docker compose)

          Download \`docker-compose.prod.yml\` from the assets below, then:

          \`\`\`bash
          export RACKSCOPE_VERSION=${VERSION}
          docker compose -f docker-compose.prod.yml up -d
          \`\`\`

          See the [documentation](https://rackscope.dev) for full deployment instructions.
          NOTES

      - name: Create GitHub Release
        uses: softprops/action-gh-release@a06a81a03ee405af7f2048a818ed3f03bbf83c7b  # v2
        with:
          tag_name: ${{ needs.build-images.outputs.tag }}
          name: "Rackscope v${{ needs.build-images.outputs.version }}"
          body_path: release_notes.md
          files: docker-compose.prod.yml
          generate_release_notes: false
          make_latest: true
