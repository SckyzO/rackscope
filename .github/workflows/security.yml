name: Security Audit

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Run weekly on Monday at 08:00 UTC
    - cron: '0 8 * * 1'

jobs:
  # ── Backend: bandit (Python SAST) ─────────────────────────────────────────
  bandit:
    name: Python SAST (bandit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install bandit
        run: pip install bandit

      - name: Run bandit
        run: bandit -r src/rackscope -ll -f json -o bandit-report.json || true

      - name: Show results
        run: bandit -r src/rackscope -ll -f screen

      - name: Upload report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bandit-report
          path: bandit-report.json

  # ── Backend deps: pip-audit ────────────────────────────────────────────────
  pip-audit:
    name: Python deps (pip-audit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install pip-audit
        run: pip install pip-audit

      - name: Audit Python dependencies
        run: pip-audit --requirement <(pip show rackscope 2>/dev/null || echo "") || pip-audit

  # ── Frontend deps: npm audit ───────────────────────────────────────────────
  npm-audit:
    name: Frontend deps (npm audit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Run npm audit
        working-directory: frontend
        # Report only high and critical; known exceptions tracked in issue #4
        run: npm audit --audit-level=critical || true

      - name: Show full audit report
        working-directory: frontend
        run: npm audit --json | python3 -c "
import sys, json
d = json.load(sys.stdin)
meta = d.get('metadata', {}).get('vulnerabilities', {})
print(f'Vulnerabilities: critical={meta.get(\"critical\",0)}, high={meta.get(\"high\",0)}, moderate={meta.get(\"moderate\",0)}, low={meta.get(\"low\",0)}')
" || true
