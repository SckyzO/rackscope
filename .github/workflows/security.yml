name: Security Audit

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Run weekly on Monday at 08:00 UTC
    - cron: '0 8 * * 1'

jobs:
  # ── Backend: bandit (Python SAST) ─────────────────────────────────────────
  bandit:
    name: Python SAST (bandit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - uses: actions/setup-python@42375524e23c412d93fb67b49958b491fce71c38  # v5.4.0
        with:
          python-version: '3.12'

      - name: Install bandit
        run: pip install bandit

      - name: Run bandit
        continue-on-error: true
        run: bandit -r src/rackscope -ll -f json -o bandit-report.json

      - name: Show results
        run: bandit -r src/rackscope -ll -f screen

      - name: Upload report
        if: always()
        uses: actions/upload-artifact@4cec3d8aa04e39d1a68397de0c4cd6fb9dce8ec1  # v4.6.1
        with:
          name: bandit-report
          path: bandit-report.json

  # ── Backend deps: pip-audit ────────────────────────────────────────────────
  pip-audit:
    name: Python deps (pip-audit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - uses: actions/setup-python@42375524e23c412d93fb67b49958b491fce71c38  # v5.4.0
        with:
          python-version: '3.12'

      - name: Install pip-audit
        run: pip install pip-audit

      - name: Audit Python dependencies
        continue-on-error: true
        run: pip-audit

  # ── Frontend deps: npm audit ───────────────────────────────────────────────
  npm-audit:
    name: Frontend deps (npm audit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - uses: actions/setup-node@cdca7365b2dadb8aad0a33bc7601856ffabcc48e  # v4.3.0
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci --legacy-peer-deps

      - name: Run npm audit
        working-directory: frontend
        continue-on-error: true
        # Report only high and critical; known exceptions tracked in issue #4
        run: npm audit --audit-level=critical

      - name: Show full audit report
        working-directory: frontend
        run: npm audit --json | python3 -c "
import sys, json
d = json.load(sys.stdin)
meta = d.get('metadata', {}).get('vulnerabilities', {})
print(f'Vulnerabilities: critical={meta.get(\"critical\",0)}, high={meta.get(\"high\",0)}, moderate={meta.get(\"moderate\",0)}, low={meta.get(\"low\",0)}')
" || true
