name: Docker

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'plugins/**'
      - 'pyproject.toml'
      - 'frontend/**'
      - '.github/workflows/docker.yml'
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-backend:
    name: Backend image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      security-events: write  # required for trivy SARIF upload if enabled later

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4

      - name: Log in to GHCR
        uses: docker/login-action@74a5d142397b4f367a81961eba4e8cd7edddf772  # v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # GHCR requires lowercase owner — github.repository_owner is lowercase by spec
      # but we sanitize explicitly to be safe (Context7: docker/build-push-action troubleshooting)
      - name: Sanitize image name (lowercase)
        id: image
        run: |
          echo "backend=${{ env.REGISTRY }}/${{ github.repository_owner }}/rackscope-backend" \
            | tr '[:upper:]' '[:lower:]' >> "$GITHUB_OUTPUT"

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@902fa8ec7d6ecbea8a1d7c8972e929f6e4bdddf3  # v5
        with:
          images: ${{ steps.image.outputs.backend }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=sha-,format=short

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@b5ca514318bd6ebac0fb2aedd5d36ec1b4b353d7  # v3

      - name: Build and push
        id: build
        uses: docker/build-push-action@14487ce63c7a62a4a324b0bfb37086795e31c6c1  # v6
        with:
          context: .
          file: src/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Scan image for vulnerabilities (Trivy)
        uses: aquasecurity/trivy-action@76071ef0cf7e4c54e6db04e833ebc68d1f80a0d6  # v0.31.0
        with:
          # Use the image digest to avoid tag resolution issues
          image-ref: ${{ steps.image.outputs.backend }}@${{ steps.build.outputs.digest }}
          format: 'table'
          exit-code: '0'          # informational — never block the build
          ignore-unfixed: true
          severity: 'CRITICAL,HIGH'
          trivyignores: .trivyignore
        env:
          # Required to pull the image from GHCR for scanning
          TRIVY_USERNAME: ${{ github.actor }}
          TRIVY_PASSWORD: ${{ secrets.GITHUB_TOKEN }}

  build-frontend:
    name: Frontend image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      security-events: write

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4

      - name: Log in to GHCR
        uses: docker/login-action@74a5d142397b4f367a81961eba4e8cd7edddf772  # v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Sanitize image name (lowercase)
        id: image
        run: |
          echo "frontend=${{ env.REGISTRY }}/${{ github.repository_owner }}/rackscope-frontend" \
            | tr '[:upper:]' '[:lower:]' >> "$GITHUB_OUTPUT"

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@902fa8ec7d6ecbea8a1d7c8972e929f6e4bdddf3  # v5
        with:
          images: ${{ steps.image.outputs.frontend }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=sha-,format=short

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@b5ca514318bd6ebac0fb2aedd5d36ec1b4b353d7  # v3

      - name: Build and push
        id: build
        uses: docker/build-push-action@14487ce63c7a62a4a324b0bfb37086795e31c6c1  # v6
        with:
          context: .
          file: frontend/Dockerfile.prod
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Scan image for vulnerabilities (Trivy)
        uses: aquasecurity/trivy-action@76071ef0cf7e4c54e6db04e833ebc68d1f80a0d6  # v0.31.0
        with:
          image-ref: ${{ steps.image.outputs.frontend }}@${{ steps.build.outputs.digest }}
          format: 'table'
          exit-code: '0'
          ignore-unfixed: true
          severity: 'CRITICAL,HIGH'
          trivyignores: .trivyignore
        env:
          TRIVY_USERNAME: ${{ github.actor }}
          TRIVY_PASSWORD: ${{ secrets.GITHUB_TOKEN }}
