    labels:
      rack_id: $rack_id
      pduid: $pduid
      pduname: $pduname
      inletid: $inletid
      inletname: $inletname
      outletid: $outletid
      outletname: $outletname
  - name: raritan_pdu_apparentpower_voltampere
    scope: rack
