  - name: raritan_pdu_inletrating
    scope: rack
    racks: ["*"]
    labels:
      rack_id: $rack_id
      pduid: $pduid
      pduname: $pduname
      inletid: $inletid
      inletname: $inletname
  - name: raritan_pdu_voltage_volt
    scope: rack
