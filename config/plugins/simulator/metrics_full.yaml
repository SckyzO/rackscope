metrics:
  - name: node_temperature_celsius
    scope: node
    instances: ["*"]
  - name: node_power_watts
    scope: node
    instances: ["*"]
  - name: node_load_percent
    scope: node
    instances: ["*"]
  - name: node_health_status
    scope: node
    instances: ["*"]
  - name: up
    scope: node
    instances: ["*"]

  # Node Exporter: CPU metrics
  - name: node_cpu_seconds_total
    scope: node
    instances: ["*"]
    labels:
      mode: idle
      cpu: $cpu

  # Node Exporter: Memory metrics
  - name: node_memory_MemTotal_bytes
    scope: node
    instances: ["*"]
  - name: node_memory_MemAvailable_bytes
    scope: node
    instances: ["*"]

  # Node Exporter: Filesystem metrics
  - name: node_filesystem_size_bytes
    scope: node
    instances: ["*"]
    labels:
      mountpoint: /
      fstype: ext4
  - name: node_filesystem_avail_bytes
    scope: node
    instances: ["*"]
    labels:
      mountpoint: /
      fstype: ext4

  # Node Exporter: Disk I/O metrics
  - name: node_disk_read_bytes_total
    scope: node
    instances: ["*"]
    labels:
      device: sda
  - name: node_disk_written_bytes_total
    scope: node
    instances: ["*"]
    labels:
      device: sda

  # Node Exporter: Network metrics
  - name: node_network_receive_bytes_total
    scope: node
    instances: ["*"]
    labels:
      device: eth0
  - name: node_network_transmit_bytes_total
    scope: node
    instances: ["*"]
    labels:
      device: eth0

  # Switch port metrics
  - name: switch_port_oper_status
    scope: node
    instances: ["*isw*", "*esw*"]
    labels:
      port: $port
  - name: switch_port_in_octets
    scope: node
    instances: ["*isw*", "*esw*"]
    labels:
      port: $port
  - name: switch_port_out_octets
    scope: node
    instances: ["*isw*", "*esw*"]
    labels:
      port: $port

  - name: ipmi_fan_speed_state
    scope: node
    instances: ["*"]
    labels:
      name: fan
  - name: ipmi_power_state
    scope: node
    instances: ["*"]
    labels:
      name: power
  - name: ipmi_sensor_state
    scope: node
    instances: ["*"]
    labels:
      name: sensor
  - name: ipmi_temperature_state
    scope: node
    instances: ["*"]
    labels:
      name: temperature
  - name: ipmi_voltage_state
    scope: node
    instances: ["*"]
    labels:
      name: voltage
  - name: ipmi_up
    scope: node
    instances: ["*"]

  # Slurm workload manager metrics
  - name: slurm_node_status
    scope: node
    instances: ["*"]
    labels:
      status: $status
      partition: $partition
      node_id: $node_id

  # E-Series metrics - ONLY for storage devices in racks r02-01 to r02-04
  - name: eseries_exporter_collect_error
    scope: node
    instances:
      - r02-*-da*
    labels:
      collector: all
  - name: eseries_storage_system_status
    scope: node
    instances:
      - r02-*-da*
    labels:
      status: $status
  - name: eseries_drive_status
    scope: node
    instances:
      - r02-*-da*
    labels:
      status: $status
      drive_id: $drive_id
      slot: $slot
  - name: eseries_battery_status
    scope: node
    instances:
      - r02-*-da*
    labels:
      status: $status
      tray: $tray
      slot: $slot
  - name: eseries_fan_status
    scope: node
    instances:
      - r02-*-da*
    labels:
      status: $status
      tray: $tray
      slot: $slot
  - name: eseries_power_supply_status
    scope: node
    instances:
      - r02-*-da*
    labels:
      status: $status
      tray: $tray
      slot: $slot
  - name: eseries_cache_memory_dimm_status
    scope: node
    instances:
      - r02-*-da*
    labels:
      status: $status
      tray: $tray
      slot: $slot
  - name: eseries_thermal_sensor_status
    scope: node
    instances:
      - r02-*-da*
    labels:
      status: $status
      tray: $tray
      slot: $slot

  - name: sequana3_hyc_state_info
    scope: rack
    racks: ["*"]
    labels:
      job: sequana3
      cluster: demo
      env: demo
      host: demo
      mc_type: xh3000
      model: xh3000
      region: demo
      sequana_rack_id: $rack_id
      sequana_type: liquid
      state: $state
  - name: sequana3_hyc_p_in_kpa
    scope: rack
    racks: ["*"]
    labels:
      job: sequana3
      cluster: demo
      env: demo
      host: demo
      mc_type: xh3000
      model: xh3000
      region: demo
      sequana_rack_id: $rack_id
      sequana_type: liquid
  - name: sequana3_hyc_leak_sensor_pump
    scope: rack
    racks: ["*"]
    labels:
      job: sequana3
      cluster: demo
      env: demo
      host: demo
      mc_type: xh3000
      model: xh3000
      region: demo
      sequana_rack_id: $rack_id
      sequana_type: liquid
  - name: sequana3_hyc_tmp_pcb_cel
    scope: rack
    racks: ["*"]
    labels:
      job: sequana3
      cluster: demo
      env: demo
      host: demo
      mc_type: xh3000
      model: xh3000
      region: demo
      sequana_rack_id: $rack_id
      sequana_type: liquid

  - name: raritan_pdu_activeenergy_watthour_total
    scope: rack
    racks: ["*"]
    labels:
      rack_id: $rack_id
      pduid: $pduid
      pduname: $pduname
      inletid: $inletid
      inletname: $inletname
      outletid: $outletid
      outletname: $outletname
  - name: raritan_pdu_activepower_watt
    scope: rack
