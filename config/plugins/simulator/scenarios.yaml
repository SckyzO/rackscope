# Rackscope Simulator Configuration

# Simulation timing
update_interval: 20

# Probability of incidents (0.0 to 1.0)
incident_rates:
  node_micro_failure: 0.001   # Random single node failure
  rack_macro_failure: 0.01    # Power issue on a whole rack
  aisle_cooling_failure: 0.005 # Cooling issue on a whole aisle

# Duration of incidents (in number of ticks)
incident_durations:
  rack: 3
  aisle: 5

# Behavioral Profiles
profiles:
  compute:
    base_temp: 24.0
    temp_range: 8.0
    base_power: 200.0
    power_var: 200.0
    load_min: 40.0
    load_max: 80.0
  gpu:
    base_temp: 28.0
    temp_range: 25.0
    base_power: 250.0
    power_var: 500.0
    load_min: 5.0
    load_max: 100.0
  service: # login, mngt
    base_temp: 21.0
    temp_range: 3.0
    base_power: 100.0
    power_var: 20.0
    load_min: 2.0
    load_max: 8.0
  network:
    base_temp: 32.0
    temp_range: 4.0
    base_power: 120.0
    power_var: 10.0
    load_min: 15.0
    load_max: 15.0

# Scenarios (optional overrides)
scenarios:
  full-ok:
    description: "No incidents. Low temps and load for a fully green demo."
    seed: 1
    scale_factor: 0.0
    incident_rates:
      node_micro_failure: 0.0
      rack_macro_failure: 0.0
      aisle_cooling_failure: 0.0
    profiles:
      compute:
        base_temp: 20.0
        temp_range: 4.0
        base_power: 140.0
        power_var: 40.0
        load_min: 5.0
        load_max: 20.0
      gpu:
        base_temp: 22.0
        temp_range: 6.0
        base_power: 180.0
        power_var: 80.0
        load_min: 5.0
        load_max: 25.0
      service:
        base_temp: 19.0
        temp_range: 3.0
        base_power: 90.0
        power_var: 20.0
        load_min: 2.0
        load_max: 10.0
      network:
        base_temp: 21.0
        temp_range: 3.0
        base_power: 100.0
        power_var: 20.0
        load_min: 5.0
        load_max: 15.0
  random-1-critical:
    description: "Occasional single critical node incident."
    seed: 11
    scale_factor: 0.05
    incident_rates:
      node_micro_failure: 0.01
      rack_macro_failure: 0.0
      aisle_cooling_failure: 0.0
  random-1-rack-down:
    description: "Occasional rack down incident (affects all nodes in a rack)."
    seed: 12
    scale_factor: 0.1
    incident_rates:
      node_micro_failure: 0.0
      rack_macro_failure: 0.02
      aisle_cooling_failure: 0.0
    incident_durations:
      rack: 3
  random-demo-small:
    description: "Mostly OK, rare warning/critical incidents."
    seed: 42
    scale_factor: 1.0
    incident_rates:
      node_micro_failure: 0.001
      rack_macro_failure: 0.0
      aisle_cooling_failure: 0.004
  random-demo-high:
    description: "High churn demo with frequent warning/critical incidents."
    seed: 99
    scale_factor: 1.0
    incident_rates:
      node_micro_failure: 0.10
      rack_macro_failure: 0.05
      aisle_cooling_failure: 0.20
  demo-stable:
    description: "Stable baseline with few incidents."
    update_interval_seconds: 20
    seed: 7
    scale_factor: 0.5

# Slurm wallboard helpers (optional)
# Forces a few random nodes into specific Slurm statuses every tick.
slurm_random_statuses:
  drain: 1
  down: 1
  maint: 1
slurm_random_match:
  - compute*
  - visu*
