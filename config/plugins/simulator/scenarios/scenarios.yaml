# Rackscope Simulator — Scenarios
# Each scenario is applied on top of the base config (plugin.yaml).
# Only the keys listed below are merged by apply_scenario():
#   incident_mode, changes_per_hour, seed, update_interval_seconds, profiles

# Base simulation timing
update_interval_seconds: 20

# Default incident mode (overridden per scenario)
incident_mode: light
changes_per_hour: 2

# Behavioural profiles (temp, power, load per node type)
profiles:
  compute:
    base_temp: 24.0
    temp_range: 8.0
    base_power: 200.0
    power_var: 200.0
    load_min: 40.0
    load_max: 80.0
  gpu:
    base_temp: 28.0
    temp_range: 25.0
    base_power: 250.0
    power_var: 500.0
    load_min: 5.0
    load_max: 100.0
  service:
    base_temp: 21.0
    temp_range: 3.0
    base_power: 100.0
    power_var: 20.0
    load_min: 2.0
    load_max: 8.0
  network:
    base_temp: 32.0
    temp_range: 4.0
    base_power: 120.0
    power_var: 10.0
    load_min: 15.0
    load_max: 15.0

# Scenarios (override incident_mode and other keys)
scenarios:
  full-ok:
    description: "No incidents. Low temps and load for a fully green demo."
    incident_mode: full_ok
    seed: 1
    profiles:
      compute:
        base_temp: 20.0
        temp_range: 4.0
        base_power: 140.0
        power_var: 40.0
        load_min: 5.0
        load_max: 20.0
      gpu:
        base_temp: 22.0
        temp_range: 6.0
        base_power: 180.0
        power_var: 80.0
        load_min: 5.0
        load_max: 25.0
      service:
        base_temp: 19.0
        temp_range: 3.0
        base_power: 90.0
        power_var: 20.0
        load_min: 2.0
        load_max: 10.0
      network:
        base_temp: 21.0
        temp_range: 3.0
        base_power: 100.0
        power_var: 20.0
        load_min: 5.0
        load_max: 15.0
  light:
    description: "Mostly OK with a few random warning/critical incidents."
    incident_mode: light
    changes_per_hour: 2
    seed: 42
  medium:
    description: "Moderate failures — a few critical nodes and one rack down."
    incident_mode: medium
    changes_per_hour: 4
    seed: 99
  heavy:
    description: "Many failures — several critical nodes, two racks, one hot aisle."
    incident_mode: heavy
    changes_per_hour: 4
    seed: 7
  chaos:
    description: "~15% critical, ~25% warning. High churn."
    incident_mode: chaos
    changes_per_hour: 3
    seed: null

# Slurm wallboard helpers (optional)
# Forces a few random nodes into specific Slurm statuses every tick.
slurm_random_statuses:
  drain: 1
  down: 1
  maint: 1
slurm_random_match:
  - compute*
  - visu*
