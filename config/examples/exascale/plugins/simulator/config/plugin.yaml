# Simulator Plugin Configuration — managed by Settings UI

update_interval_seconds: 20
seed: null
incident_mode: light
changes_per_hour: 2
custom_incidents:
  devices_crit: 0
  devices_warn: 0
  racks_crit: 0
  aisles_hot: 0
overrides_path: config/plugins/simulator/overrides/overrides.yaml
default_ttl_seconds: 120
metrics_catalog_path: config/plugins/simulator/metrics/metrics_full.yaml
metrics_catalogs: []
slurm_alloc_percent: 80
slurm_random_statuses:
  drain: 1
  down: 1
  maint: 1
slurm_random_match:
- compute*
- visu*
