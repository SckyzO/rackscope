# Slurm Plugin Configuration — managed by Settings UI

metric: slurm_node_status
label_node: node
label_status: status
label_partition: partition
mapping_path: ''
roles: []
include_unlabeled: false
status_map:
  ok:
  - idle
  - allocated
  - alloc
  - completing
  - comp
  warn:
  - mixed
  - mix
  - maint
  - planned
  - plnd
  - reserved
  - resv
  crit:
  - down
  - drain
  - drained
  - draining
  - drng
  - fail
  - failing
  - failg
  - error
  info: []
severity_colors:
  ok: '#22c55e'
  warn: '#f59e0b'
  crit: '#ef4444'
  info: '#3b82f6'
metrics_catalog_dir: config/plugins/slurm/metrics
metrics_catalogs:
- metrics.yaml
