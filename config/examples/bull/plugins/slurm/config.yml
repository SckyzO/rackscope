# Slurm Plugin Configuration — managed by Settings UI

metric: slurm_node_status
label_node: node
label_status: status
label_partition: partition
mapping_path: config/examples/bull/plugins/slurm/node_mapping.yaml
roles:
- compute
- gpu
- highmem
- visu
include_unlabeled: false
status_map:
  ok:
  - allocated
  - alloc
  - completing
  - comp
  - mixed
  - mix
  warn:
  - maint
  - planned
  - plnd
  - reserved
  - resv
  - blocked
  - power_down
  - power_up
  - powering_up
  - powered_down
  - reboot_issued
  - reboot_req
  crit:
  - down
  - drain
  - drained
  - draining
  - drng
  - fail
  - failing
  - failg
  - error
  - unknown
  - unk
  - noresp
  - inval
  info:
  - idle
severity_colors:
  ok: '#22c55e'
  warn: '#f59e0b'
  crit: '#ef4444'
  info: '#3b82f6'
