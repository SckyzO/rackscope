templates:
  - id: bs-xh3150-tino-1u-3n
    name: BullSequana XH3150 Tino (1U 3 Nodes)
    type: server
    role: compute
    u_height: 1
    layout:
      type: grid
      rows: 1
      cols: 3
      matrix:
        - - 1
          - 2
          - 3
    checks:
      - node_up
      - node_recent_reboot
      - node_temp_warn
      - node_temp_crit
      - ipmi_up
      - ipmi_fan_speed_state
      - ipmi_power_state
      - ipmi_sensor_state
      - ipmi_temperature_state
      - ipmi_voltage_state
    metrics:
      - node_temperature
      - node_power

  - id: bs-xh3145-tiya-1u-2n
    name: BullSequana XH3145 Tiya (1U 2 Nodes)
    type: server
    role: highmem
    u_height: 1
    layout:
      type: grid
      rows: 1
      cols: 2
      matrix:
        - - 1
          - 2
    checks:
      - node_up
      - node_recent_reboot
      - node_temp_warn
      - node_temp_crit
      - ipmi_up
      - ipmi_fan_speed_state
      - ipmi_power_state
      - ipmi_sensor_state
      - ipmi_temperature_state
      - ipmi_voltage_state
    metrics:
      - node_temperature
      - node_power

  - id: bs-xh3515-neba-1u-2n
    name: BullSequana XH3515 Neba (1U 2 Nodes GPU)
    type: server
    role: gpu
    u_height: 1
    layout:
      type: grid
      rows: 1
      cols: 2
      matrix:
        - - 1
          - 2
    checks:
      - node_up
      - node_recent_reboot
      - node_temp_warn
      - node_temp_crit
      - ipmi_up
      - ipmi_fan_speed_state
      - ipmi_power_state
      - ipmi_sensor_state
      - ipmi_temperature_state
      - ipmi_voltage_state
    metrics:
      - node_temperature
      - node_power

  - id: bs-x430-service-2u
    name: BullSequana X430 Service (2U 1 Node)
    type: server
    role: login
    u_height: 2
    layout:
      type: grid
      rows: 1
      cols: 1
      matrix:
        - - 1
    rear_layout:
      type: grid
      rows: 1
      cols: 2
      matrix:
        - - 901
          - 902
    rear_components:
      - id: '901'
        name: Rear Fan
        type: fan
        checks:
          - ipmi_fan_speed_state
          - ipmi_sensor_state
      - id: '902'
        name: Rear PSU
        type: psu
        checks:
          - ipmi_power_state
          - ipmi_voltage_state
    checks:
      - node_up
      - node_recent_reboot
      - node_temp_warn
      - node_temp_crit
      - ipmi_up
      - ipmi_fan_speed_state
      - ipmi_power_state
      - ipmi_sensor_state
      - ipmi_temperature_state
      - ipmi_voltage_state
    metrics:
      - node_temperature
      - node_power
    display_thresholds:
      temperature:
        warn: 40
        crit: 48

  - id: bs-x450-visu-4u
    name: BullSequana X450 Visualization (4U 1 Node)
    type: server
    role: visu
    u_height: 4
    layout:
      type: grid
      rows: 1
      cols: 1
      matrix:
        - - 1
    checks:
      - node_up
      - node_recent_reboot
      - node_temp_warn
      - node_temp_crit
      - ipmi_up
      - ipmi_fan_speed_state
      - ipmi_power_state
      - ipmi_sensor_state
      - ipmi_temperature_state
      - ipmi_voltage_state
    metrics:
      - node_temperature
      - node_power

  - id: srv-1u-mgmt
    name: Management Server 1U
    type: server
    role: management
    u_height: 1
    layout:
      type: grid
      rows: 1
      cols: 1
      matrix:
        - - 1
    rear_layout:
      type: grid
      rows: 1
      cols: 2
      matrix:
        - - 901
          - 902
    rear_components:
      - id: '901'
        name: Rear Fan
        type: fan
        checks:
          - ipmi_fan_speed_state
          - ipmi_sensor_state
      - id: '902'
        name: Rear PSU
        type: psu
        checks:
          - ipmi_power_state
          - ipmi_voltage_state
    checks:
      - node_up
      - node_recent_reboot
      - node_temp_warn
      - node_temp_crit
      - ipmi_up
      - ipmi_fan_speed_state
      - ipmi_power_state
      - ipmi_sensor_state
      - ipmi_temperature_state
      - ipmi_voltage_state
    metrics:
      - node_temperature
      - node_power
    display_thresholds:
      temperature:
        warn: 40
        crit: 48

  - id: generic-1u-storage-head
    name: Storage Head 1U
    type: server
    role: storage
    u_height: 1
    layout:
      type: grid
      rows: 1
      cols: 1
      matrix:
        - - 1
    checks:
      - node_up
    metrics: []

  - id: generic-2u-jbod
    name: JBOD 2U
    type: storage
    u_height: 2
    layout:
      type: grid
      rows: 1
      cols: 1
      matrix:
        - - 1
    checks: []
    metrics: []
