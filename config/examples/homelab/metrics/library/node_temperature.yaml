metrics:
- id: node_temperature
  name: CPU Temperature
  description: CPU temperature from IPMI/BMC
  expr: ipmi_temperature_celsius{instance="$instance",name=~"CPU.*"}
  display:
    unit: °C
    chart_type: line
    color: '#ef4444'
    thresholds:
    - value: 75
      color: '#f59e0b'
    - value: 90
      color: '#ef4444'
  category: hardware
  tags:
  - ipmi
  - temperature
