templates:
  - id: bs-x410-accel-2u
    name: "BullSequana X410 Acceleration (2U 1 Node)"
    type: server
    u_height: 2
    layout:
      type: grid
      rows: 1
      cols: 1
      matrix: [[1]]

  - id: bs-x430-service-2u
    name: "BullSequana X430 Service (2U 1 Node)"
    type: server
    u_height: 2
    layout:
      type: grid
      rows: 1
      cols: 1
      matrix: [[1]]
    rear_layout:
      type: grid
      rows: 1
      cols: 2
      matrix: [[901, 902]]
    rear_components:
      - id: "901"
        name: "Rear Fan"
        type: fan
        checks:
          - ipmi_fan_speed_state
          - ipmi_sensor_state
      - id: "902"
        name: "Rear PSU"
        type: psu
        checks:
          - ipmi_power_state
          - ipmi_voltage_state

  - id: bs-x440-compute-2u-2n
    name: "BullSequana X440 Compute (2U 2 Nodes)"
    type: server
    u_height: 2
    layout:
      type: grid
      rows: 1
      cols: 2
      matrix: [[1, 2]]

  - id: bs-x440-compute-2u-4n
    name: "BullSequana X440 Compute (2U 4 Nodes)"
    type: server
    u_height: 2
    layout:
      type: grid
      rows: 2
      cols: 2
      matrix:
        - [3, 4]
        - [1, 2]

  - id: bs-x450-visu-4u
    name: "BullSequana X450 Visualization (4U 1 Node)"
    type: server
    u_height: 4
    layout:
      type: grid
      rows: 1
      cols: 1
      matrix: [[1]]

  - id: bs-xh3140-trio-1u-3n
