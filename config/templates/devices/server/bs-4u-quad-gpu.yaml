templates:
- id: bs-4u-quad-gpu
  name: BullSequana X2415 (4U Quad GPU)
  type: server
  role: gpu
  u_height: 4
  layout:
    type: grid
    rows: 2
    cols: 2
    matrix:
    - [1, 2]
    - [3, 4]
  rear_layout:
    type: grid
    rows: 1
    cols: 4
    matrix:
    - [901, 902, 903, 904]
  checks:
  - node_up
  - node_recent_reboot
  - ipmi_up
  - ipmi_fan_speed_state
  - ipmi_power_state
  - ipmi_sensor_state
  - ipmi_temperature_state
  - ipmi_voltage_state
  metrics:
  - node_up
  - node_cpu_usage
  - node_memory_used_percent
  - node_memory_available_bytes
  - node_disk_usage_percent
  - node_disk_io_read_bytes
  - node_disk_io_write_bytes
  - node_network_receive_bytes
  - node_network_transmit_bytes
  - node_temperature
  - node_power
  - node_load
  - node_health_status
  - ipmi_up
  - ipmi_fan_speed_state
  - ipmi_temperature_state
  - ipmi_power_state
  - ipmi_voltage_state
  - ipmi_sensor_state
  - slurm_node_status
