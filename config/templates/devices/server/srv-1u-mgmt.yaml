templates:
- id: srv-1u-mgmt
  name: Management Server 1U
  type: server
  role: management
  u_height: 1
  layout:
    type: grid
    rows: 1
    cols: 1
    matrix:
    - - 1
  rear_layout:
    type: grid
    rows: 1
    cols: 2
    matrix:
    - - 901
      - 902
  rear_components:
  - id: '901'
    name: Rear Fan
    type: fan
    checks:
    - ipmi_fan_speed_state
    - ipmi_sensor_state
  - id: '902'
    name: Rear PSU
    type: psu
    checks:
    - ipmi_power_state
    - ipmi_voltage_state
  checks:
  - node_up
  - node_recent_reboot
  - ipmi_up
  - ipmi_fan_speed_state
  - ipmi_power_state
  - ipmi_sensor_state
  - ipmi_temperature_state
  - ipmi_voltage_state
  metrics:
  - node_up
  - node_cpu_usage
  - node_memory_used_percent
  - node_memory_available_bytes
  - node_disk_usage_percent
  - node_disk_io_read_bytes
  - node_disk_io_write_bytes
  - node_network_receive_bytes
  - node_network_transmit_bytes
  - node_temperature
  - node_power
  - node_load
  - node_health_status
  - ipmi_up
  - ipmi_fan_speed_state
  - ipmi_temperature_state
  - ipmi_power_state
  - ipmi_voltage_state
  - ipmi_sensor_state
  - slurm_node_status
