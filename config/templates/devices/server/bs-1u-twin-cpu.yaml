templates:
- id: bs-1u-twin-cpu
  name: BullSequana X410 (1U Twin)
  type: server
  u_height: 1
  layout:
    type: grid
    rows: 1
    cols: 2
    matrix:
    - - 1
      - 2
  rear_layout:
    type: grid
    rows: 1
    cols: 2
    matrix:
    - - 901
      - 902
  checks:
  - node_up
  - node_recent_reboot
  - ipmi_up
  - ipmi_fan_speed_state
  - ipmi_power_state
  - ipmi_sensor_state
  - ipmi_temperature_state
  - ipmi_voltage_state
