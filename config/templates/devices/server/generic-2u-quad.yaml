# 2U chassis with 4 nodes (2×2 grid)
templates:
  - id: generic-2u-quad
    name: "Generic 2U Quad (4 nodes)"
    type: server
    u_height: 2
    role: compute
    layout:
      type: grid
      rows: 2
      cols: 2
      matrix:
        - [1, 2]
        - [3, 4]
    checks:
      - node_up
      - ipmi_temp_warn
      - ipmi_temp_crit
      - ipmi_power_state
