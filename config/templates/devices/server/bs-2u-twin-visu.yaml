templates:
- id: bs-2u-twin-visu
  name: BullSequana Visu Node (2U)
  type: server
  role: visu
  u_height: 2
  layout:
    type: grid
    rows: 1
    cols: 2
    matrix:
    - - 1
      - 2
  rear_layout:
    type: grid
    rows: 1
    cols: 2
    matrix:
    - - 901
      - 902
  checks:
  - node_up
  - node_recent_reboot
  - ipmi_up
  - ipmi_fan_speed_state
  - ipmi_power_state
  - ipmi_sensor_state
  - ipmi_temperature_state
  - ipmi_voltage_state
  metrics:
  - node_temperature
  - node_power
