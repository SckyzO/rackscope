templates:
- id: bs-x410-accel-2u
  name: BullSequana X410 Acceleration (2U 1 Node)
  type: server
  role: gpu
  u_height: 2
  layout:
    type: grid
    rows: 1
    cols: 1
    matrix:
    - - 1
  checks:
  - node_up
  - node_recent_reboot
  - ipmi_up
  - ipmi_fan_speed_state
  - ipmi_power_state
  - ipmi_sensor_state
  - ipmi_temperature_state
  - ipmi_voltage_state
  metrics:
  - node_temperature
  - node_power
