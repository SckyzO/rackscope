# 2U chassis with 2 independent compute nodes side-by-side
templates:
  - id: generic-2u-twin
    name: "Generic 2U Twin (2 nodes)"
    type: server
    u_height: 2
    role: compute
    layout:
      type: grid
      rows: 1
      cols: 2
      matrix: [[1, 2]]
    checks:
      - node_up
      - ipmi_temp_warn
      - ipmi_temp_crit
      - ipmi_power_state
