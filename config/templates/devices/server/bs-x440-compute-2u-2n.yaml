templates:
- id: bs-x440-compute-2u-2n
  name: BullSequana X440 Compute (2U 2 Nodes)
  type: server
  u_height: 2
  layout:
    type: grid
    rows: 1
    cols: 2
    matrix:
    - - 1
      - 2
  checks:
  - node_up
  - node_recent_reboot
  - ipmi_up
  - ipmi_fan_speed_state
  - ipmi_power_state
  - ipmi_sensor_state
  - ipmi_temperature_state
  - ipmi_voltage_state
