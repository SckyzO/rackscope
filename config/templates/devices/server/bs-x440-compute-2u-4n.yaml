templates:
- id: bs-x440-compute-2u-4n
  name: BullSequana X440 Compute (2U 4 Nodes)
  type: server
  role: compute
  u_height: 2
  layout:
    type: grid
    rows: 2
    cols: 2
    matrix:
    - [3, 4]
    - [1, 2]
  checks:
  - node_up
  - node_recent_reboot
  - ipmi_up
  - ipmi_fan_speed_state
  - ipmi_power_state
  - ipmi_sensor_state
  - ipmi_temperature_state
  - ipmi_voltage_state
  metrics:
  - node_up
  - node_cpu_usage
  - node_memory_used_percent
  - node_memory_available_bytes
  - node_disk_usage_percent
  - node_disk_io_read_bytes
  - node_disk_io_write_bytes
  - node_network_receive_bytes
  - node_network_transmit_bytes
  - node_temperature
  - node_power
  - node_load
  - node_health_status
  - ipmi_up
  - ipmi_fan_speed_state
  - ipmi_temperature_state
  - ipmi_power_state
  - ipmi_voltage_state
  - ipmi_sensor_state
  - slurm_node_status
