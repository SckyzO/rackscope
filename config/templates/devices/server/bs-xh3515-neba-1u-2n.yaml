templates:
- id: bs-xh3515-neba-1u-2n
  name: BullSequana XH3515 Neba (1U 2 Nodes)
  type: server
  role: compute
  u_height: 1
  layout:
    type: grid
    rows: 1
    cols: 2
    matrix:
    - [1, 2]
  checks:
  - node_up
  - node_recent_reboot
  - ipmi_up
  - ipmi_fan_speed_state
  - ipmi_power_state
  - ipmi_sensor_state
  - ipmi_temperature_state
  - ipmi_voltage_state
  metrics:
  - node_up
  - node_cpu_usage
  - node_memory_used_percent
  - node_memory_available_bytes
  - node_disk_usage_percent
  - node_disk_io_read_bytes
  - node_disk_io_write_bytes
  - node_network_receive_bytes
  - node_network_transmit_bytes
  - node_temperature
  - node_power
  - node_load
  - node_health_status
  - ipmi_up
  - ipmi_fan_speed_state
  - ipmi_temperature_state
  - ipmi_power_state
  - ipmi_voltage_state
  - ipmi_sensor_state
  - slurm_node_status
