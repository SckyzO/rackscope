paths:
  topology: config/topology
  templates: config/templates
  checks: config/checks/library.yaml
refresh:
  room_state_seconds: 30
  rack_state_seconds: 30
cache:
  ttl_seconds: 30
telemetry:
  prometheus_url: http://prometheus:9090
  identity_label: instance
  rack_label: rack_id
  chassis_label: chassis_id
  job_regex: node|rackscope-simulator
  prometheus_heartbeat_seconds: 30
  prometheus_latency_window: 20
  basic_auth_user: null
  basic_auth_password: null
  tls_verify: true
  tls_ca_file: null
  tls_cert_file: null
  tls_key_file: null
planner:
  unknown_state: UNKNOWN
  cache_ttl_seconds: 30
  max_ids_per_query: 50
features:
  notifications: true
  playlist: false
  offline: false
  demo: true
simulator:
  update_interval_seconds: 20
  seed: null
  scenario: full-ok
  scale_factor: 1.0
  incident_rates:
    node_micro_failure: 0.001
    rack_macro_failure: 0.01
    aisle_cooling_failure: 0.005
  incident_durations:
    rack: 3
    aisle: 5
  overrides_path: config/simulator_overrides.yaml
