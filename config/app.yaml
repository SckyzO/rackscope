# ── Application identity ──────────────────────────────────────────────────────
app:
  name: Rackscope
  description: Datacenter Monitoring

# ── Configuration file paths ──────────────────────────────────────────────────
paths:
  topology: config/topology
  templates: config/templates
  checks: config/checks/library
  metrics: config/metrics/library

# ── Backend refresh intervals ─────────────────────────────────────────────────
# Server-side Prometheus polling cadence — distinct from per-page frontend
# refresh buttons (which are per-user settings stored in localStorage).
refresh:
  room_state_seconds: 60
  rack_state_seconds: 60

# ── Prometheus query cache ────────────────────────────────────────────────────
cache:
  ttl_seconds: 60
  health_checks_ttl_seconds: 30
  metrics_ttl_seconds: 120

# ── Telemetry (Prometheus connection) ─────────────────────────────────────────
telemetry:
  prometheus_url: http://prometheus:9090
  identity_label: instance        # Prometheus label that maps to a node name
  rack_label: rack_id
  chassis_label: chassis_id
  job_regex: node|rackscope-simulator
  prometheus_heartbeat_seconds: 30
  prometheus_latency_window: 20   # Samples used to compute average latency
  debug_stats: false
  # HTTP Basic Auth (uncomment to enable)
  basic_auth_user: null
  basic_auth_password: null
  # TLS (uncomment and configure for HTTPS Prometheus endpoints)
  tls_verify: false
  tls_ca_file: null
  tls_cert_file: null
  tls_key_file: null

# ── TelemetryPlanner ──────────────────────────────────────────────────────────
# Batches Prometheus queries to avoid per-device query explosion.
# See docs/architecture/backend.md for details.
planner:
  unknown_state: UNKNOWN          # State assigned when no data is returned
  cache_ttl_seconds: 60           # Planner snapshot cache TTL
  max_ids_per_query: 300          # Max node IDs per PromQL query (tune for large clusters)

# ── Feature flags ─────────────────────────────────────────────────────────────
features:
  notifications: true             # Alert toast popups
  notifications_max_visible: 10   # Max visible entries in notification feed
  playlist: true                  # Wallboard / kiosk rotation
  offline: true                   # Offline mode indicator
  worldmap: true                  # World Map view
  dev_tools: true                 # Developer tools section in sidebar
  wizard: true                    # Setup wizard on first launch (set false to disable)

# ── Authentication ────────────────────────────────────────────────────────────
auth:
  enabled: false
  username: admin
  password_hash: $2b$12$X91lqP3eT0gSs7rF9JdM0OtowhwbsugMYDDGySdrXscVmtggB4eCS  # bcrypt hash of "password" — change before production!
  secret_key: ''
  session_duration: 24h
  policy:
    min_length: 6
    max_length: 128
    require_digit: false
    require_symbol: false

# ── World map defaults ────────────────────────────────────────────────────────
# Can be overridden per-user in Settings → Views.
map:
  default_view: world
  default_zoom: 2
  min_zoom: 2
  max_zoom: 7
  zoom_controls: true
  center:
    lat: 20.0
    lon: 0.0

# ── Playlist defaults ─────────────────────────────────────────────────────────
# Per-user queue and interval are stored in localStorage.
# These are the factory defaults shown in Settings → Views.
playlist:
  interval_seconds: 30
  views:
    - /views/worldmap
    - /slurm/overview

# ── Plugins ───────────────────────────────────────────────────────────────────
# Only the enabled flag lives here.
# Full plugin configuration is in config/plugins/{plugin_id}/config.yml
plugins:
  simulator:
    enabled: true
  slurm:
    enabled: true
