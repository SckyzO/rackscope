app:
  name: Rackscope
  description: Datacenter Overview
paths:
  topology: config/topology
  templates: config/templates
  checks: config/checks/library
  metrics: config/metrics/library
refresh:
  room_state_seconds: 60
  rack_state_seconds: 60
cache:
  ttl_seconds: 60
  health_checks_ttl_seconds: 30
  metrics_ttl_seconds: 120
telemetry:
  prometheus_url: http://prometheus:9090
  identity_label: instance
  rack_label: rack_id
  chassis_label: chassis_id
  job_regex: node|rackscope-simulator
  prometheus_heartbeat_seconds: 30
  prometheus_latency_window: 20
  debug_stats: false
  basic_auth_user: null
  basic_auth_password: null
  tls_verify: false
  tls_ca_file: null
  tls_cert_file: null
  tls_key_file: null
planner:
  unknown_state: UNKNOWN
  cache_ttl_seconds: 60
  max_ids_per_query: 300
features:
  notifications: true
  notifications_max_visible: 10
  playlist: false
  offline: true
  demo: false
  worldmap: true
  dev_tools: false
playlist:
  interval_seconds: 30
  views:
    - /cosmos/views/worldmap
    - /cosmos/slurm/overview
auth:
  enabled: false
  username: admin
  password_hash: $2b$12$X91lqP3eT0gSs7rF9JdM0OtowhwbsugMYDDGySdrXscVmtggB4eCS
  secret_key: ''
  session_duration: 24h
  policy:
    min_length: 6
    max_length: 128
    require_digit: false
    require_symbol: false
map:
  default_view: world
  default_zoom: 4
  min_zoom: 2
  max_zoom: 7
  zoom_controls: true
  center:
    lat: 20.0
    lon: 0.0
# Plugin toggles — detailed config in config/plugins/{name}/config.yml
# See PLUGINS.md for documentation
plugins:
  simulator:
    enabled: true
  slurm:
    enabled: true
