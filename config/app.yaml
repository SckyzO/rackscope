paths:
  topology: config/topology
  templates: config/templates
  checks: config/checks/library.yaml

refresh:
  room_state_seconds: 30
  rack_state_seconds: 30

cache:
  ttl_seconds: 30

telemetry:
  prometheus_url: http://prometheus:9090
  identity_label: instance
  rack_label: rack_id
  chassis_label: chassis_id
  job_regex: node|rackscope-simulator
  basic_auth_user:
  basic_auth_password:
  tls_verify: true
  tls_ca_file:
  tls_cert_file:
  tls_key_file:

planner:
  unknown_state: UNKNOWN
  cache_ttl_seconds: 30
  max_ids_per_query: 50
