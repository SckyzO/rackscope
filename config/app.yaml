app:
  name: Rackscope
  description: Datacenter Overview
paths:
  topology: config/topology
  templates: config/templates
  checks: config/checks
  metrics: config/metrics/library
refresh:
  room_state_seconds: 30
  rack_state_seconds: 30
cache:
  ttl_seconds: 30
  health_checks_ttl_seconds: 30
  metrics_ttl_seconds: 120
telemetry:
  prometheus_url: null
  identity_label: instance
  rack_label: rack_id
  chassis_label: chassis_id
  job_regex: .*
  prometheus_heartbeat_seconds: 30
  prometheus_latency_window: 20
  debug_stats: false
  basic_auth_user: null
  basic_auth_password: null
  tls_verify: true
  tls_ca_file: null
  tls_cert_file: null
  tls_key_file: null
planner:
  unknown_state: UNKNOWN
  cache_ttl_seconds: 30
  max_ids_per_query: 200
features:
  notifications: true
  notifications_max_visible: 10
  playlist: false
  offline: false
  wizard: false
  worldmap: true
  dev_tools: false
auth:
  enabled: false
  username: admin
  password_hash: ''
  secret_key: ''
  session_duration: 24h
  policy:
    min_length: 6
    max_length: 128
    require_digit: false
    require_symbol: false
map:
  default_view: world
  default_zoom: null
  min_zoom: 2
  max_zoom: 7
  zoom_controls: true
  center:
    lat: 20
    lon: 0
playlist:
  interval_seconds: 30
  views:
  - /views/worldmap
  - /slurm/overview
plugins: {}
simulator: null
slurm:
  metric: slurm_node_status
  label_node: node
  label_status: status
  label_partition: partition
  status_map:
    ok:
    - idle
    - allocated
    - alloc
    - completing
    - comp
    warn:
    - mixed
    - mix
    - maint
    - planned
    - plnd
    - reserved
    - resv
    - blocked
    - block
    - power_down
    - pow_dn
    - power_up
    - pow_up
    - powering_up
    - powered_down
    - reboot_issued
    - reboot_req
    crit:
    - down
    - drain
    - drained
    - draining
    - drng
    - fail
    - failing
    - failg
    - error
    - unknown
    - unk
    - noresp
    - inval
  roles:
  - compute
  - visu
  include_unlabeled: false
  mapping_path: null
