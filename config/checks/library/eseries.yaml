# NetApp E-Series storage array checks — uses eseries_exporter metrics.
# scope: node — the 'node' here is the storage controller (management endpoint).
# expand_by_label drives per-slot evaluation without hardcoding slot names in code.
checks:
  - id: eseries_exporter_collect_error
    name: E-Series exporter collect error
    for: "1m"
    scope: node
    kind: eseries
    expr: eseries_exporter_collect_error{instance=~"$instances"}
    output: bool
    rules:
      - op: "=="
        value: 1
        severity: WARN

  - id: eseries_storage_system_status
    name: E-Series storage system health
    for: "1m"
    scope: node
    kind: eseries
    expr: eseries_storage_system_status{status!~"(optimal)",instance=~"$instances"}
    output: numeric
    rules:
      - op: "=="
        value: 1
        severity: CRIT

  - id: eseries_drive_status
    name: E-Series drive health
    for: "5m"
    scope: node
    kind: eseries
    expr: eseries_drive_status{status!~"(optimal)",instance=~"$instances"}
    output: numeric
    expand_by_label: slot
    # Discovery query fetches all slots so optimal drives display as OK (green)
    expand_discovery_expr: eseries_drive_status{instance=~"$instances"}
    expand_absent_state: OK
    # expand_crit_threshold: 2  # Uncomment: fewer than 2 CRIT disks → array WARN not CRIT
    rules:
      - op: "=="
        value: 1
        severity: CRIT

  - id: eseries_battery_status
    name: E-Series battery health
    for: "5m"
    scope: node
    kind: eseries
    expr: eseries_battery_status{status!~"(optimal|learning)",instance=~"$instances"}
    output: numeric
    rules:
      - op: "=="
        value: 1
        severity: CRIT

  - id: eseries_fan_status
    name: E-Series fan health
    for: "1m"
    scope: node
    kind: eseries
    expr: eseries_fan_status{status!~"(optimal)",instance=~"$instances"}
    output: numeric
    rules:
      - op: "=="
        value: 1
        severity: WARN

  - id: eseries_power_supply_status
    name: E-Series power supply health
    for: "1m"
    scope: node
    kind: eseries
    expr: eseries_power_supply_status{status!~"(optimal)",instance=~"$instances"}
    output: numeric
    rules:
      - op: "=="
        value: 1
        severity: CRIT

  - id: eseries_cache_memory_dimm_status
    name: E-Series cache memory DIMM health
    for: "5m"
    scope: node
    kind: eseries
    expr: eseries_cache_memory_dimm_status{status!~"(optimal)",instance=~"$instances"}
    output: numeric
    rules:
      - op: "=="
        value: 1
        severity: WARN

  - id: eseries_thermal_sensor_status
    name: E-Series thermal sensor health
    for: "5m"
    scope: node
    kind: eseries
    expr: eseries_thermal_sensor_status{status!~"(optimal)",instance=~"$instances"}
    output: numeric
    rules:
      - op: "=="
        value: 1
        severity: WARN
