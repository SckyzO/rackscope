kinds:
  compute:
    - id: node_up
      name: Node reachable
      scope: node
      expr: up{job="node", instance=~"$instances"}
      output: bool
      selectors: ["instance"]
      rules:
        - op: "=="
          value: 0
          severity: CRIT
    - id: node_temp_warn
      name: Node temperature warning
      scope: node
      expr: node_temperature_celsius{instance=~"$instances"}
      output: numeric
      selectors: ["instance"]
      rules:
        - op: ">"
          value: 30
          severity: WARN
  rack:
    - id: rack_power_budget
      name: Rack power budget
      scope: rack
      expr: rack_power_watts{rack_id=~"$racks"}
      output: numeric
      selectors: ["rack_id"]
      rules:
        - op: ">"
          value: 12000
          severity: WARN
