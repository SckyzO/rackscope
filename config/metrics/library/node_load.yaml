id: node_load
name: Node CPU Load
description: CPU load percentage
metric: node_load_percent
labels:
  instance: "{instance}"
display:
  unit: "%"
  chart_type: line
  color: "#3b82f6"
  time_ranges:
    - 1h
    - 6h
    - 24h
  default_range: 6h
  aggregation: avg
  thresholds:
    warn: 80
    crit: 95
category: performance
tags:
  - compute
  - cpu
