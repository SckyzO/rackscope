id: pdu_active_power
name: PDU Active Power
description: PDU active power consumption in watts
# inletid!="" selects inlet-level rows only (4 PDUs × 2 inlets = 8 series summed = total rack power)
metric: raritan_pdu_activepower_watt{rack_id="{rack_id}",inletid!=""}
labels:
  rack_id: "{rack_id}"
  pduid: "{pduid}"
  inletid: "{inletid}"
display:
  unit: "W"
  chart_type: area
  color: "#f59e0b"
  time_ranges:
    - 1h
    - 6h
    - 24h
    - 7d
    - 30d
  default_range: 6h
  aggregation: avg
  thresholds:
    warn: 3000
    crit: 3500
  format:
    decimals: 1
category: power
tags:
  - infrastructure
  - pdu
  - energy
