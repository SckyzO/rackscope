id: node_health_status
name: Node Health Status
description: Overall node health (0=OK, 1=Warning, 2=Critical)
metric: node_health_status
labels:
  instance: "{instance}"
display:
  unit: "enum"
  chart_type: line
  color: "#f59e0b"
  time_ranges:
    - 1h
    - 6h
    - 24h
    - 7d
  default_range: 24h
  aggregation: avg
  thresholds:
    warn: 1
    crit: 2
category: health
tags:
  - compute
  - monitoring
