id: pdu_voltage
name: PDU Voltage
description: PDU inlet voltage in volts
metric: raritan_pdu_voltage_volt{rack_id="{rack_id}"}
labels:
  rack_id: "{rack_id}"
  pduid: "{pduid}"
  inletid: "{inletid}"
display:
  unit: "V"
  chart_type: line
  color: "#8b5cf6"
  time_ranges:
    - 1h
    - 6h
    - 24h
    - 7d
  default_range: 6h
  aggregation: avg
  thresholds:
    warn: 210
    crit: 200
  format:
    decimals: 1
category: power
tags:
  - infrastructure
  - pdu
  - electrical
