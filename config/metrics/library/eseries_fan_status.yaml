id: eseries_fan_status
name: E-Series Fan Status
description: E-Series fan status (0=optimal, 1=failed)
metric: eseries_fan_status{instance="{instance}",status="failed"}
labels:
  instance: "{instance}"
display:
  unit: "bool"
  chart_type: line
  color: "#06b6d4"
  time_ranges:
    - 1h
    - 6h
    - 24h
    - 7d
  default_range: 24h
  aggregation: max
  thresholds:
    warn: 1
category: health
tags:
  - storage
  - eseries
  - cooling
  - hardware
