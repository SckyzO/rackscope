id: switch_port_traffic_out
name: Switch Port Traffic Out
description: Network switch port egress traffic rate in bytes/second
metric: rate(switch_port_out_octets{instance="{instance}"}[5m])
labels:
  instance: "{instance}"
display:
  unit: "bytes/s"
  chart_type: area
  color: "#f97316"
  time_ranges:
    - 1h
    - 6h
    - 24h
    - 7d
  default_range: 6h
  aggregation: avg
  format:
    decimals: 0
category: network
tags:
  - infrastructure
  - switch
  - bandwidth
  - traffic
