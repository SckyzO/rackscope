id: eseries_exporter_collect_error
name: E-Series Exporter Errors
description: E-Series exporter collection errors (1=error, 0=ok)
metric: eseries_exporter_collect_error{instance="{instance}"}
labels:
  instance: "{instance}"
display:
  unit: "bool"
  chart_type: line
  color: "#ef4444"
  time_ranges:
    - 1h
    - 6h
    - 24h
    - 7d
  default_range: 24h
  aggregation: max
  thresholds:
    warn: 1
category: health
tags:
  - storage
  - eseries
  - error
