id: switch_port_status
name: Switch Port Status
description: Network switch port operational status (1=up, 0=down)
metric: switch_port_oper_status{instance="{instance}"}
labels:
  instance: "{instance}"
display:
  unit: "bool"
  chart_type: line
  color: "#10b981"
  time_ranges:
    - 1h
    - 6h
    - 24h
    - 7d
  default_range: 24h
  aggregation: avg
  thresholds:
    crit: 0
category: network
tags:
  - infrastructure
  - switch
  - connectivity
