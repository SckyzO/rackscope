id: eseries_drive_status
name: E-Series Drive Status
description: E-Series drive status (0=optimal, 1=failed)
metric: eseries_drive_status{instance="{instance}",status="failed"}
labels:
  instance: "{instance}"
display:
  unit: "bool"
  chart_type: line
  color: "#f97316"
  time_ranges:
    - 1h
    - 6h
    - 24h
    - 7d
  default_range: 24h
  aggregation: max
  thresholds:
    crit: 1
category: health
tags:
  - storage
  - eseries
  - disk
  - hardware
