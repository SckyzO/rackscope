id: node_disk_usage_percent
name: Node Disk Usage
description: Filesystem usage percentage for root mount
metric: (node_filesystem_size_bytes{instance="{instance}",mountpoint="/"} - node_filesystem_avail_bytes{instance="{instance}",mountpoint="/"}) / node_filesystem_size_bytes{instance="{instance}",mountpoint="/"} * 100
labels:
  instance: "{instance}"
display:
  unit: "%"
  chart_type: gauge
  color: "#f59e0b"
  time_ranges:
    - 1h
    - 6h
    - 24h
    - 7d
    - 30d
  default_range: 24h
  aggregation: avg
  thresholds:
    warn: 80
    crit: 90
category: storage
tags:
  - compute
  - disk
  - filesystem
  - node_exporter
