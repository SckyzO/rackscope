id: rack_power
name: Rack Power Consumption
description: Total rack power from PDUs
metric: sum(raritan_pdu_activepower_watt{rack_id="{rack_id}"})
labels:
  rack_id: "{rack_id}"
display:
  unit: "W"
  chart_type: area
  color: "#f59e0b"
  time_ranges:
    - 1h
    - 6h
    - 24h
    - 7d
    - 30d
  default_range: 24h
  aggregation: avg
  thresholds:
    warn: 8000
    crit: 10000
category: power
tags:
  - infrastructure
  - energy
