id: sequana3_pressure
name: Sequana3 Coolant Pressure
description: Sequana3 liquid cooling system pressure in kPa
metric: sequana3_hyc_p_in_kpa{rack_id="{rack_id}"}
labels:
  rack_id: "{rack_id}"
display:
  unit: "kPa"
  chart_type: line
  color: "#06b6d4"
  time_ranges:
    - 1h
    - 6h
    - 24h
    - 7d
  default_range: 6h
  aggregation: avg
  thresholds:
    warn: 180
    crit: 170
  format:
    decimals: 1
category: cooling
tags:
  - infrastructure
  - liquid
  - sequana3
  - cooling
