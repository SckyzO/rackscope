id: sequana3_board_temperature
name: Sequana3 Board Temperature
description: Sequana3 cooling controller PCB temperature in Celsius
metric: sequana3_hyc_tmp_pcb_cel{rack_id="{rack_id}"}
labels:
  rack_id: "{rack_id}"
display:
  unit: "°C"
  chart_type: line
  color: "#ef4444"
  time_ranges:
    - 1h
    - 6h
    - 24h
    - 7d
  default_range: 6h
  aggregation: avg
  thresholds:
    warn: 75
    crit: 85
  format:
    decimals: 1
category: cooling
tags:
  - infrastructure
  - liquid
  - sequana3
  - cooling
  - temperature
