id: eseries_battery_status
name: E-Series Battery Status
description: E-Series battery status (0=optimal, 1=failed)
metric: eseries_battery_status{instance="{instance}",status="failed"}
labels:
  instance: "{instance}"
display:
  unit: "bool"
  chart_type: line
  color: "#eab308"
  time_ranges:
    - 1h
    - 6h
    - 24h
    - 7d
  default_range: 24h
  aggregation: max
  thresholds:
    crit: 1
category: health
tags:
  - storage
  - eseries
  - power
  - hardware
