id: node_disk_io_write_bytes
name: Node Disk Write Rate
description: Disk write throughput in bytes per second
metric: rate(node_disk_written_bytes_total{instance="{instance}"}[5m])
labels:
  instance: "{instance}"
display:
  unit: "bytes/s"
  chart_type: line
  color: "#ec4899"
  time_ranges:
    - 1h
    - 6h
    - 24h
    - 7d
  default_range: 6h
  aggregation: avg
  format:
    decimals: 0
category: performance
tags:
  - compute
  - disk
  - io
  - node_exporter
