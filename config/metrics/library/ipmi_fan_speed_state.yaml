id: ipmi_fan_speed_state
name: IPMI Fan Speed State
description: Fan speed sensor state from IPMI (0=nominal, 1=warning, 2=critical)
metric: ipmi_fan_speed_state{instance="{instance}"}
labels:
  instance: "{instance}"
display:
  unit: "enum"
  chart_type: line
  color: "#06b6d4"
  time_ranges:
    - 1h
    - 6h
    - 24h
    - 7d
  default_range: 24h
  aggregation: max
  thresholds:
    warn: 1
    crit: 2
category: health
tags:
  - compute
  - hardware
  - ipmi
  - cooling
