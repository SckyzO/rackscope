id: node_temperature
name: Node Temperature
description: CPU/IPMI temperature sensor
metric: node_temperature_celsius
labels:
  instance: "{instance}"
display:
  unit: "°C"
  chart_type: line
  color: "#ef4444"
  time_ranges:
    - 1h
    - 6h
    - 24h
    - 7d
  default_range: 24h
  aggregation: avg
  thresholds:
    warn: 70
    crit: 85
category: temperature
tags:
  - compute
  - hardware
