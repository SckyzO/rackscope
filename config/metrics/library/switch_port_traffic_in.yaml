id: switch_port_traffic_in
name: Switch Port Traffic In
description: Network switch port ingress traffic rate in bytes/second
metric: rate(switch_port_in_octets{instance="{instance}"}[5m])
labels:
  instance: "{instance}"
display:
  unit: "bytes/s"
  chart_type: area
  color: "#14b8a6"
  time_ranges:
    - 1h
    - 6h
    - 24h
    - 7d
  default_range: 6h
  aggregation: avg
  format:
    decimals: 0
category: network
tags:
  - infrastructure
  - switch
  - bandwidth
  - traffic
