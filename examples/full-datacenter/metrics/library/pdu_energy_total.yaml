id: pdu_energy_total
name: PDU Energy Consumption
description: PDU cumulative energy consumption in watt-hours
metric: raritan_pdu_activeenergy_watthour_total{rack_id="{rack_id}"}
labels:
  rack_id: "{rack_id}"
  pduid: "{pduid}"
  inletid: "{inletid}"
display:
  unit: "Wh"
  chart_type: line
  color: "#eab308"
  time_ranges:
    - 1h
    - 6h
    - 24h
    - 7d
    - 30d
  default_range: 24h
  aggregation: sum
  format:
    decimals: 1
category: power
tags:
  - infrastructure
  - pdu
  - energy
  - billing
