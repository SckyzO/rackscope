id: pdu_current
name: PDU Current
description: PDU current draw in amperes
metric: raritan_pdu_current_ampere
labels:
  rack_id: "{rack_id}"
  pduid: "{pduid}"
  inletid: "{inletid}"
display:
  unit: "A"
  chart_type: line
  color: "#8b5cf6"
  time_ranges:
    - 1h
    - 6h
    - 24h
  default_range: 6h
  aggregation: avg
  thresholds:
    warn: 28
    crit: 32
category: power
tags:
  - infrastructure
  - pdu
