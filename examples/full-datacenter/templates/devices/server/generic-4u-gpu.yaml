# 4U chassis with 2 GPU nodes (tall, side-by-side)
templates:
  - id: generic-4u-gpu
    name: "Generic 4U GPU Chassis (2 nodes)"
    type: server
    u_height: 4
    role: gpu
    layout:
      type: grid
      rows: 1
      cols: 2
      matrix: [[1, 2]]
    checks:
      - node_up
      - ipmi_temp_warn
      - ipmi_temp_crit
      - ipmi_power_state
