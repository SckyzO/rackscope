checks:
  - id: node_up
    name: "Node Up"
    kind: server
    scope: node
    expr: 'up{instance=~"$instances"}'
    output: bool
    rules:
      - op: "=="
        value: 0
        severity: CRIT

  - id: switch_up
    name: "Switch Up"
    kind: switch
    scope: node
    expr: 'up{instance=~"$instances"}'
    output: bool
    rules:
      - op: "=="
        value: 0
        severity: CRIT
