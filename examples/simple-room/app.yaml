app:
  name: Rackscope
  description: My Lab

paths:
  topology: topology
  templates: templates
  checks: checks/library

telemetry:
  prometheus_url: http://prometheus:9090
  identity_label: instance
  job_regex: ".*"

features:
  wizard: false
  worldmap: false

auth:
  enabled: false
  username: admin
  password_hash: ""

plugins:
  simulator:
    enabled: true
    incident_mode: light
    changes_per_hour: 2
