templates:
- id: bs-x450-visu-4u
  name: BullSequana X450 Visualization (4U 1 Node)
  type: server
  role: visu
  u_height: 4
  layout:
    type: grid
    rows: 1
    cols: 1
    matrix:
    - - 1
  checks:
  - node_up
  - node_recent_reboot
  - ipmi_up
  - ipmi_fan_speed_state
  - ipmi_power_state
  - ipmi_sensor_state
  - ipmi_temperature_state
  - ipmi_voltage_state
  metrics:
  - node_temperature
  - node_power
