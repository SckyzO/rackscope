id: sequana3_pmc_power
name: PMC Total Power
description: Total rack power consumption measured by the Power Management Controller (PMC)
metric: sequana3_pmc_total_watt{rack_id="{rack_id}"}
labels:
  rack_id: "{rack_id}"
display:
  unit: "W"
  chart_type: area
  color: "#f59e0b"
  time_ranges:
    - 1h
    - 6h
    - 24h
    - 7d
  default_range: 6h
  aggregation: avg
  thresholds:
    warn: 7000
    crit: 8000
  format:
    decimals: 0
category: power
tags:
  - infrastructure
  - pmc
  - energy
  - bullsequana
