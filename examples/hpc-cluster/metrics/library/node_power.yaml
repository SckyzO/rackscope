id: node_power
name: Node Power Consumption
description: Real-time power draw in watts
metric: node_power_watts
labels:
  instance: "{instance}"
display:
  unit: "W"
  chart_type: area
  color: "#fbbf24"
  time_ranges:
    - 1h
    - 6h
    - 24h
    - 7d
  default_range: 24h
  aggregation: avg
category: power
tags:
  - compute
  - energy
