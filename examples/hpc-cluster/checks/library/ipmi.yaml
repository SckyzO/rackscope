# IPMI hardware checks — uses the prometheus-ipmi-exporter metric conventions.
# Severity values: 0=OK, 1=WARN, 2=CRIT (matches ipmi_exporter state encoding).
checks:
  - id: ipmi_fan_speed_state
    name: IPMI fan speed state
    for: "1m"
    scope: node
    kind: ipmi
    expr: ipmi_fan_speed_state{instance=~"$instances"}
    output: numeric
    rules:
      - op: "=="
        value: 1
        severity: WARN
      - op: "=="
        value: 2
        severity: CRIT

  - id: ipmi_power_state
    name: IPMI power state
    for: "1m"
    scope: node
    kind: ipmi
    expr: ipmi_power_state{instance=~"$instances"}
    output: numeric
    rules:
      - op: "=="
        value: 1
        severity: WARN
      - op: "=="
        value: 2
        severity: CRIT

  - id: ipmi_sensor_state
    name: IPMI sensor state
    for: "1m"
    scope: node
    kind: ipmi
    expr: ipmi_sensor_state{name!~"Low Security Jmp|Phy Presence Jmp|Dongle Cable",instance=~"$instances"}
    output: numeric
    rules:
      - op: "=="
        value: 1
        severity: WARN
      - op: "=="
        value: 2
        severity: CRIT

  - id: ipmi_temperature_state
    name: IPMI temperature state
    for: "5m"
    scope: node
    kind: ipmi
    expr: ipmi_temperature_state{instance=~"$instances"}
    output: numeric
    rules:
      - op: "=="
        value: 1
        severity: WARN
      - op: "=="
        value: 2
        severity: CRIT

  - id: ipmi_up
    name: IPMI exporter up
    for: null
    scope: node
    kind: ipmi
    expr: ipmi_up{instance=~"$instances"}
    output: bool
    rules:
      - op: "=="
        value: 0
        severity: CRIT

  - id: ipmi_voltage_state
    name: IPMI voltage state
    for: "1m"
    scope: node
    kind: ipmi
    expr: ipmi_voltage_state{instance=~"$instances"}
    output: numeric
    rules:
      - op: "=="
        value: 1
        severity: WARN
      - op: "=="
        value: 2
        severity: CRIT
