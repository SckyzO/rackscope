# Network switch health checks — kind: network.
# Temperature and power thresholds are hardware-agnostic; tune per environment.
checks:
  - id: switch_up
    name: Switch up
    for: null
    scope: node
    kind: network
    expr: up{instance=~"$instances"} == 0
    output: numeric
    rules:
      - severity: CRIT
        op: "=="
        value: 1

  - id: switch_temp_warn
    name: Switch temperature warn
    for: "5m"
    scope: node
    kind: network
    expr: node_temperature_celsius{instance=~"$instances"}
    output: numeric
    rules:
      - severity: WARN
        op: ">"
        value: 45

  - id: switch_temp_crit
    name: Switch temperature crit
    for: "5m"
    scope: node
    kind: network
    expr: node_temperature_celsius{instance=~"$instances"}
    output: numeric
    rules:
      - severity: CRIT
        op: ">"
        value: 60

  - id: switch_power_warn
    name: Switch power warn
    for: "5m"
    scope: node
    kind: network
    expr: node_power_watts{instance=~"$instances"}
    output: numeric
    rules:
      - severity: WARN
        op: ">"
        value: 1000

  - id: switch_power_crit
    name: Switch power crit
    for: "5m"
    scope: node
    kind: network
    expr: node_power_watts{instance=~"$instances"}
    output: numeric
    rules:
      - severity: CRIT
        op: ">"
        value: 1500
