# Slurm Metrics Catalog
# Each file in this directory is auto-loaded by the Slurm plugin.
# Add more files here for additional metric groups.
#
# Fields:
#   id          — unique identifier (used in API queries)
#   name        — human-readable label
#   description — longer description shown in UI
#   metric      — actual Prometheus metric name from your exporter
#   scope       — global | node | partition | job
#   display     — visual hints (unit, chart_type, thresholds)
#
# Thresholds (optional):
#   warn: value above which the metric turns amber
#   crit: value above which it turns red

metrics:

  # ── Global cluster metrics ─────────────────────────────────────────────────

  - id: slurm_running_jobs
    name: Running Jobs
    description: Total number of running jobs across all partitions
    metric: slurm_running_jobs_total
    scope: global
    display:
      unit: jobs
      chart_type: gauge

  - id: slurm_pending_jobs
    name: Pending Jobs
    description: Jobs waiting in queue (not yet allocated)
    metric: slurm_pending_jobs_total
    scope: global
    display:
      unit: jobs
      chart_type: gauge
      thresholds:
        warn: 100
        crit: 500

  - id: slurm_nodes_total
    name: Total Nodes
    description: Total number of nodes registered in Slurm
    metric: slurm_nodes_total
    scope: global
    display:
      unit: nodes
      chart_type: number

  - id: slurm_nodes_idle
    name: Idle Nodes
    description: Nodes with no running job
    metric: slurm_nodes_idle
    scope: global
    display:
      unit: nodes
      chart_type: number

  - id: slurm_nodes_alloc
    name: Allocated Nodes
    description: Nodes with at least one running job
    metric: slurm_nodes_alloc
    scope: global
    display:
      unit: nodes
      chart_type: number

  - id: slurm_nodes_down
    name: Down Nodes
    description: Nodes in DOWN state
    metric: slurm_nodes_down
    scope: global
    display:
      unit: nodes
      chart_type: number
      thresholds:
        warn: 1
        crit: 5

  - id: slurm_cpus_total
    name: Total CPUs
    description: Total CPUs available in the cluster
    metric: slurm_cpus_total
    scope: global
    display:
      unit: cores
      chart_type: number

  - id: slurm_cpus_alloc
    name: Allocated CPUs
    description: CPUs currently allocated to running jobs
    metric: slurm_cpus_alloc
    scope: global
    display:
      unit: cores
      chart_type: bar

  - id: slurm_cpu_allocation_ratio
    name: CPU Allocation %
    description: Percentage of CPUs currently in use
    metric: round(slurm_cpus_alloc / slurm_cpus_total * 100, 1)
    scope: global
    display:
      unit: '%'
      chart_type: gauge
      thresholds:
        warn: 80
        crit: 95

  # ── Per-partition metrics ──────────────────────────────────────────────────

  - id: slurm_partition_running_jobs
    name: Running Jobs (by partition)
    description: Running jobs split by partition
    metric: slurm_partition_running_jobs_total
    scope: partition
    display:
      unit: jobs
      chart_type: bar

  - id: slurm_partition_pending_jobs
    name: Pending Jobs (by partition)
    description: Pending jobs split by partition
    metric: slurm_partition_pending_jobs_total
    scope: partition
    display:
      unit: jobs
      chart_type: bar
      thresholds:
        warn: 50
        crit: 200

  # ── Per-node metrics ────────────────────────────────────────────────────────

  - id: slurm_node_cpus_alloc
    name: Node CPU Allocated
    description: Number of CPUs allocated on this node
    metric: slurm_node_cpus_alloc
    scope: node
    display:
      unit: cores
      chart_type: bar

  - id: slurm_node_mem_alloc
    name: Node Memory Allocated
    description: Memory currently allocated on this node (MB)
    metric: slurm_node_mem_alloc
    scope: node
    display:
      unit: MB
      chart_type: bar
      thresholds:
        warn: 80
        crit: 95
