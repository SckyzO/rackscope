# BullSequana X Series Templates
templates:
  - id: bs-x430-a5
    name: "BullSequana X430-A5 (2U 1-Node)"
    type: server
    u_height: 2
    layout:
      type: grid
      rows: 1
      cols: 1
      # Simple 1x1, slot 1
      matrix: [[1]]

  - id: bs-x440-a5
    name: "BullSequana X440-A5 (2U 4-Node)"
    type: server
    u_height: 2
    layout:
      type: grid
      rows: 2
      cols: 2
      # Visual physical layout (Front View)
      # [ Slot 3 | Slot 4 ]  (Top Row)
      # [ Slot 1 | Slot 2 ]  (Bottom Row)
      matrix: 
        - [3, 4]
        - [1, 2]
    rear_layout:
      type: grid
      rows: 1
      cols: 4
      # Rear View: [ PSU L | FAN A | FAN B | PSU R ]
      # Using negative numbers or specific IDs to denote infrastructure components?
      # For visualization only, we'll use specific slot IDs that we won't map to nodes for now.
      matrix:
        - [901, 902, 903, 904]

  - id: generic-switch-1u
    name: "Generic Top of Rack Switch"
    type: network
    u_height: 1
    layout:
      type: grid
      rows: 1
      cols: 1
      matrix: [[1]]
    rear_layout:
      type: grid
      rows: 1
      cols: 2
      # [ Power | Management ]
      matrix: [[901, 902]]
