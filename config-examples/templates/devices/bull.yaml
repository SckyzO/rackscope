# BullSequana X Series Templates
templates:
  # --- CPU NODES ---
  - id: bs-1u-twin-cpu
    name: "BullSequana X410 (1U Twin)"
    type: server
    u_height: 1
    layout:
      type: grid
      rows: 1
      cols: 2
      matrix: [[1, 2]]
    rear_layout:
      type: grid
      rows: 1
      cols: 2
      matrix: [[901, 902]]

  # --- GPU NODES ---
  - id: bs-4u-quad-gpu
    name: "BullSequana X2415 (4U Quad GPU)"
    type: server
    u_height: 4
    layout:
      type: grid
      rows: 2
      cols: 2
      # Big quadrants
      matrix:
        - [1, 2]
        - [3, 4]
    rear_layout:
      type: grid
      rows: 1
      cols: 4
      matrix: [[901, 902, 903, 904]]

  # --- VISU NODES ---
  - id: bs-2u-twin-visu
    name: "BullSequana Visu Node (2U)"
    type: server
    u_height: 2
    layout:
      type: grid
      rows: 1
      cols: 2
      matrix: [[1, 2]]
    rear_layout:
      type: grid
      rows: 1
      cols: 2
      # GPU outputs visible on rear
      matrix: [[901, 902]]

  # --- GENERIC SERVERS ---
  - id: srv-1u-mgmt
    name: "Management Server 1U"
    type: server
    u_height: 1
    layout:
      type: grid
      rows: 1
      cols: 1
      matrix: [[1]]