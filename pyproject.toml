[project]
name = "rackscope"
version = "0.0.0"
description = "Rack & Server Monitoring Dashboard (Prometheus-first physical views)"
readme = "README.md"
requires-python = ">=3.11"
license = {text = "MIT"}
authors = [{name = "rackscope contributors"}]
dependencies = [
  "pydantic>=2.12.5",
  "pyyaml>=6.0.3",
  "fastapi>=0.128.0",
  "uvicorn>=0.40",
  "httpx>=0.28.1",
]

[project.optional-dependencies]
dev = [
  "pytest>=8.4",
  "ruff>=0.14.14",
]

[project.scripts]
rackscope = "rackscope.__main__:main"

[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[tool.ruff]
line-length = 100

[tool.ruff.format]
quote-style = "double"
