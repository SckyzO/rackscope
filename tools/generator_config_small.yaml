version: "1.0"
description: "Small test topology - 1 aisle, 2 racks, ~40 nodes"

node_counters:
  compute: 1
  gpu: 1

sites:
  - id: test-dc
    name: "Test Datacenter"
    location:
      latitude: 48.8566
      longitude: 2.3522
      address: "Paris, France"

    rooms:
      - id: room-test
        name: "Test Room"

        aisles:
          # Single aisle with 2 compute racks
          - id: aisle-test
            name: "Test Aisle"
            racks:
              # 2 CPU Racks (20 nodes each)
              - count: 2
                id_pattern: "rack-{rack_num:02d}"
                name_pattern: "Test Rack {rack_num:02d}"
                template_id: "standard-42u-air"
                u_height: 42
                devices:
                  # Top switch
                  - template_id: "eth-switch-tor"
                    count: 1
                    u_start: 42
                    name_pattern: "switch-{rack_num:02d}"
                    id_pattern: "{rack_id}-sw"
                  # 10x 1U Twin (2 nodes) = 20 nodes/rack
                  - template_id: "bs-1u-twin-cpu"
                    count: 10
                    u_start: 1
                    u_step: 2
                    name_pattern: "Compute {i:02d}"
                    id_pattern: "{rack_id}-c{i:02d}"
                    nodes_pattern: "compute[{start:03d}-{end:03d}]"
                    nodes_per_device: 2
