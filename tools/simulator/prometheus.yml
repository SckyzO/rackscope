global:
  scrape_interval: 5s

scrape_configs:
  - job_name: 'rackscope-simulator'
    scrape_interval: 15s
    scrape_timeout: 12s
    static_configs:
      - targets: ['simulator:9000']
    metric_relabel_configs:
      - source_labels: [node_id]
        target_label: instance
        regex: (.+)
        replacement: $1
        action: replace
      - source_labels: [__name__]
        target_label: job
        regex: .*
        replacement: node
        action: replace
