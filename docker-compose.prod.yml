services:
  backend:
    build:
      context: .
      dockerfile: src/Dockerfile
      args:
        UID: "${UID:-1000}"
        GID: "${GID:-1000}"
    user: "${UID:-1000}:${GID:-1000}"
    ports:
      - "8000:8000"
    volumes:
      - ./config:/app/config:ro
    environment:
      - RACKSCOPE_APP_CONFIG=/app/config/app.yaml
    command: uvicorn rackscope.api.app:app --host 0.0.0.0 --port 8000
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
      target: production
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped
