services:
  backend:
    build:
      context: .
      dockerfile: src/Dockerfile
      args:
        UID: "${UID:-1000}"
        GID: "${GID:-1000}"
    user: "${UID:-1000}:${GID:-1000}"
    ports:
      - "8000:8000"
    volumes:
      - ./src:/app/src
      - ./config:/app/config
      - ./tests:/app/tests
      - ./tools:/app/tools
      - ./pyproject.toml:/app/pyproject.toml
      - ./mypy.ini:/app/mypy.ini
    environment:
      - RACKSCOPE_APP_CONFIG=/app/config/app.yaml
    command: uvicorn rackscope.api.app:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - CHOKIDAR_USEPOLLING=true

  playwright:
    image: mcr.microsoft.com/playwright:v1.58.2-jammy
    user: "${UID:-1000}:${GID:-1000}"
    working_dir: /workspace
    volumes:
      - ./:/workspace
    depends_on:
      - frontend
    command: ["sleep", "infinity"]

  simulator:
    build:
      context: ./tools/simulator
    ports:
      - "9000:9000"
    volumes:
      - ./config:/app/config:ro
    environment:
      - TOPOLOGY_FILE=/app/config/topology
      - SIMULATOR_CONFIG=/app/config/plugins/simulator/scenarios/scenarios.yaml
      - SIMULATOR_APP_CONFIG=/app/config/app.yaml

  docs:
    build:
      context: ./website
      dockerfile: Dockerfile
    ports:
      - "3001:3001"
    volumes:
      - ./website/docs:/app/docs
      - ./website/src:/app/src
      - ./website/static:/app/static
      - ./website/docusaurus.config.js:/app/docusaurus.config.js
      - ./website/sidebars.js:/app/sidebars.js

  prometheus:
    image: prom/prometheus:latest
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--web.enable-admin-api'
    ports:
      - "9090:9090"
    volumes:
      - ./tools/simulator/prometheus.yml:/etc/prometheus/prometheus.yml:ro
