services:
  # ── Reverse proxy ─────────────────────────────────────────────────────────
  # Entrypoints:
  #   https://localhost      → React app (frontend)
  #   https://localhost/api  → FastAPI backend (REST + Swagger at /api/docs)
  #   http://localhost       → redirects to HTTPS
  #
  # First run: generate the self-signed cert with `make cert`
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro
    depends_on:
      - frontend
      - backend
    restart: unless-stopped

  backend:
    build:
      context: .
      dockerfile: src/Dockerfile
      args:
        UID: "${UID:-1000}"
        GID: "${GID:-1000}"
    user: "${UID:-1000}:${GID:-1000}"
    volumes:
      - ./src:/app/src
      - ./plugins:/app/plugins
      - ./config:/app/config
      - ./tests:/app/tests
      - ./tools:/app/tools
      - ./pyproject.toml:/app/pyproject.toml
      - ./mypy.ini:/app/mypy.ini
    environment:
      - RACKSCOPE_APP_CONFIG=/app/config/${APP_CONFIG:-app.yaml}
    command: uvicorn rackscope.api.app:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - ./plugins:/app/plugins
    environment:
      - CHOKIDAR_USEPOLLING=true

  playwright:
    image: mcr.microsoft.com/playwright:v1.58.2-jammy
    user: "${UID:-1000}:${GID:-1000}"
    working_dir: /workspace
    volumes:
      - ./:/workspace
    depends_on:
      - frontend
    command: ["sleep", "infinity"]

  simulator:
    build:
      context: ./plugins/simulator/process
    restart: unless-stopped
    ports:
      - "9000:9000"
    volumes:
      - ./config:/app/config:ro
    environment:
      - TOPOLOGY_FILE=/app/config/topology
      - SIMULATOR_CONFIG=/app/config/plugins/simulator/config/plugin.yaml
      - SIMULATOR_APP_CONFIG=/app/config/${APP_CONFIG:-app.yaml}

  docs:
    build:
      context: ./website
      dockerfile: Dockerfile
    ports:
      - "3001:3001"
    environment:
      - DOCS_BASE_URL=/docs/
    volumes:
      - ./website/docs:/app/docs
      - ./website/src:/app/src
      - ./website/static:/app/static
      - ./website/docusaurus.config.js:/app/docusaurus.config.js
      - ./website/sidebars.js:/app/sidebars.js

  prometheus:
    image: prom/prometheus:latest
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--web.enable-admin-api'
    ports:
      - "9090:9090"
    volumes:
      - ./plugins/simulator/process/prometheus.yml:/etc/prometheus/prometheus.yml:ro
