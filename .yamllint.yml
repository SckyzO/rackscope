extends: default
rules:
  line-length:
    max: 200
    level: warning
  comments:
    min-spaces-from-content: 1
  truthy:
    allowed-values: ['true', 'false', 'yes', 'no', 'on', 'off']
    check-keys: false
  braces:
    min-spaces-inside: 0
    max-spaces-inside: 1
  brackets:
    min-spaces-inside: 0
    max-spaces-inside: 1
  document-start:
    present: false
  colons:
    # Docker volume paths (host:container) and aligned CI outputs trigger this rule.
    # Colon spacing in values is not a correctness issue — disable.
    max-spaces-after: -1
  indentation: disable
  empty-lines:
    # Allow up to 2 blank lines between top-level sections (common in long YAML files)
    max: 2
    max-start: 0
    max-end: 0
ignore: |
  config.bak/
  node_modules/
  .git/
  frontend/node_modules/
  website/node_modules/
