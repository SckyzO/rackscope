# Rackscope — Nginx reverse proxy (dev)
# Generate TLS cert first: make cert

# HTTP → HTTPS redirect
server {
    listen 80;
    server_name localhost;
    return 301 https://$host$request_uri;
}

# HTTPS entry point
server {
    listen 443 ssl;
    server_name localhost;

    ssl_certificate     /etc/nginx/certs/cert.pem;
    ssl_certificate_key /etc/nginx/certs/key.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # Docker internal DNS resolver — re-resolve service hostnames every 10s.
    # Required so that nginx picks up new container IPs after a container
    # restart (otherwise nginx caches the IP at startup and returns 502).
    resolver 127.0.0.11 valid=10s;
    resolver_timeout 5s;

    # API + FastAPI Swagger (/api/docs, /api/redoc, /api/openapi.json)
    location /api {
        set $backend_upstream http://backend:8000;
        proxy_pass         $backend_upstream;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # React app + Vite HMR WebSocket
    location / {
        set $frontend_upstream http://frontend:5173;
        proxy_pass             $frontend_upstream;
        proxy_http_version     1.1;
        proxy_set_header       Upgrade    $http_upgrade;
        proxy_set_header       Connection "upgrade";
        proxy_set_header       Host       $host;
        proxy_set_header       X-Real-IP  $remote_addr;
        proxy_read_timeout     86400;
    }
}
